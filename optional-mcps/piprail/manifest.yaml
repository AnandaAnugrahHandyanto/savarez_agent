# Nous-approved MCP catalog entry.
# Presence in this directory = approval. Merged via PR review.
#
# Schema version 1.
manifest_version: 1

name: piprail
description: Pay x402 "402 Payment Required" URLs autonomously with a budget-bound, self-custodial
  crypto wallet across many chains (EVM, Solana, TON, Tron, NEAR, Sui, Aptos, Algorand, Stellar,
  XRPL). No fee, no hosted facilitator — funds settle straight to the merchant, verified locally
  against your own RPC.
source: https://github.com/piprail/piprail

transport:
  type: stdio
  command: "npx"
  args: ["-y", "@piprail/mcp"]

# PIPRAIL_PRIVATE_KEY is a self-custodial WALLET key, NOT an API key. It is OPTIONAL:
# @piprail/mcp boots KEY-LESS in read-only mode (discover/quote/register/budget/guide all
# work). pay/plan require the key (else they return WALLET_REQUIRED).
auth:
  type: api_key
  env:
    - name: PIPRAIL_PRIVATE_KEY
      prompt: "PipRail wallet private key (self-custodial; leave blank for read-only — discover/quote work, pay/plan disabled)"
      required: false
      secret: true

tools:
  default_enabled:
    - piprail_discover
    - piprail_quote_payment
    - piprail_plan_payment
    - piprail_pay_request
    - piprail_register
    - piprail_budget
    - piprail_guide

post_install: |
  PipRail pays x402 URLs from a self-custodial wallet you control — funds go straight to the
  merchant, verified locally against your own RPC. No hosted facilitator, no fee.

  PIPRAIL_PRIVATE_KEY is a WALLET key, never an API key. With no key, PipRail runs read-only
  (discover/quote work; pay/plan return WALLET_REQUIRED). Set the key to let the agent pay —
  every payment is bounded by a spend policy (PIPRAIL_MAX_AMOUNT / PIPRAIL_MAX_TOTAL) the model
  cannot exceed. Start a new Hermes session to load the tools.
