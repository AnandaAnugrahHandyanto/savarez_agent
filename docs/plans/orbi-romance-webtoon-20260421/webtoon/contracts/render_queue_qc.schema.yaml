$schema: https://json-schema.org/draft/2020-12/schema
type: object
additionalProperties: false
required:
  - episode
  - render_mode
  - contract_versions
  - candidate_policy
  - output
  - jobs
properties:
  episode:
    type: string
    minLength: 1
  render_mode:
    type: string
    const: live_fal_flux2_pro
  contract_versions:
    type: object
    additionalProperties: false
    required:
      - shot_spec
      - continuity_bible
      - qc_manifest
    properties:
      shot_spec:
        type: integer
        minimum: 2
      continuity_bible:
        type: integer
        minimum: 1
      qc_manifest:
        type: integer
        minimum: 1
  candidate_policy:
    type: object
    additionalProperties: false
    required:
      - selection_required
      - default_candidate_count
      - max_rerenders_per_panel
      - review_required_panels
      - non_reviewed_panel_policy
    properties:
      selection_required:
        type: boolean
        const: true
      default_candidate_count:
        type: integer
        minimum: 2
      max_rerenders_per_panel:
        type: integer
        minimum: 0
      review_required_panels:
        type: array
        items:
          type: string
          minLength: 1
      non_reviewed_panel_policy:
        type: object
        additionalProperties: false
        required:
          - review_status
          - reason_template
        properties:
          review_status:
            type: string
            const: not_reviewed_pilot_exception
          reason_template:
            type: string
            minLength: 1
  output:
    type: object
    additionalProperties: false
    required:
      - panels_dir
      - longscroll
      - live_manifest
      - live_panels_dir
    properties:
      panels_dir:
        type: string
        minLength: 1
      longscroll:
        type: string
        minLength: 1
      live_manifest:
        type: string
        minLength: 1
      live_panels_dir:
        type: string
        minLength: 1
  jobs:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - panel_id
        - mode
      properties:
        panel_id:
          type: string
          minLength: 1
        mode:
          type: string
          const: live_fal_flux2_pro
