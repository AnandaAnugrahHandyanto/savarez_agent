$schema: https://json-schema.org/draft/2020-12/schema
type: object
additionalProperties: false
required:
  - manifest_version
  - episode
  - mode
  - continuity_bible_ref
  - contract_versions
  - prompt_schema_version
  - dry_run
  - manifest_only
  - panels
  - longscroll
  - generated_dir
properties:
  manifest_version:
    type: integer
    minimum: 1
  episode:
    type: string
    minLength: 1
  mode:
    type: string
    const: live_fal_flux2_pro
  continuity_bible_ref:
    type: string
    minLength: 1
  contract_versions:
    type: object
    additionalProperties: false
    required:
      - shot_spec
      - continuity_bible
      - qc_manifest
    properties:
      shot_spec:
        type: integer
        minimum: 2
      continuity_bible:
        type: integer
        minimum: 1
      qc_manifest:
        type: integer
        minimum: 1
  prompt_schema_version:
    type: integer
    const: 2
  dry_run:
    type: boolean
  manifest_only:
    type: boolean
  panels:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - panel_id
        - prompt
        - final_prompt
        - review_status
        - candidate_count
        - selected_candidate
        - rejected_candidates
        - selection_reason
        - rerender_reason
        - policy_sanitized
        - final_prompt_changed
        - candidates
        - selected_scores
        - generated_panel_path
        - final_panel_path
      properties:
        panel_id:
          type: string
          minLength: 1
        prompt:
          type: string
          minLength: 1
        final_prompt:
          type: string
          minLength: 1
        review_status:
          type: string
          enum:
            - reviewed
            - not_reviewed_pilot_exception
        candidate_count:
          type: integer
          minimum: 1
        selected_candidate:
          type: string
          minLength: 1
        rejected_candidates:
          type: array
          items:
            type: string
            minLength: 1
        selection_reason:
          type: string
          minLength: 1
        rerender_reason:
          type: string
          minLength: 1
        policy_sanitized:
          type: boolean
        final_prompt_changed:
          type: boolean
        candidates:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required:
              - candidate_id
              - prompt
              - final_prompt
              - image_url
              - policy_sanitized
              - final_prompt_changed
              - generated_panel_path
            properties:
              candidate_id:
                type: string
                minLength: 1
              prompt:
                type: string
                minLength: 1
              final_prompt:
                type: string
                minLength: 1
              image_url:
                type: string
                minLength: 1
              url:
                type: string
                minLength: 1
              policy_sanitized:
                type: boolean
              final_prompt_changed:
                type: boolean
              generated_panel_path:
                type: string
                minLength: 1
        selected_scores:
          oneOf:
            - type: "null"
            - type: object
              additionalProperties: false
              required:
                - identity_score
                - continuity_score
                - acting_score
                - lettering_safety_score
              properties:
                identity_score:
                  type: number
                continuity_score:
                  type: number
                acting_score:
                  type: number
                lettering_safety_score:
                  type: number
        generated_panel_path:
          type: string
          minLength: 1
        final_panel_path:
          type: string
          minLength: 1
  longscroll:
    oneOf:
      - type: "null"
      - type: string
        minLength: 1
  generated_dir:
    type: string
    minLength: 1
