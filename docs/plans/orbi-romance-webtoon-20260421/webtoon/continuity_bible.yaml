contract_version: 1
series_id: orbi_romance_20260421
characters:
  protagonist:
    canonical_name: 강시윤
    role: admissions-track transfer-prep student
    identity_core:
      age_impression: late teen Korean male student
      body_build: slim, narrow-shouldered, tension held in neck and hands
      narrative_pressure: defensive pride masking fear of falling behind
    visual_invariants:
      hair:
        - soft black hair
        - slight center-part fringe
        - low-volume silhouette
      face:
        - pale oval face
        - tired narrow eyes
        - sharp mouth tension when cornered
      wardrobe:
        - black zip hoodie
        - muted campus basics
    default_expression_baseline:
      neutral: sleep-deprived restraint
      stress: eyes widen before posture breaks
    forbidden_drift:
      - no broad athletic build
      - no bright dyed hair
      - no adult office-worker styling
    anchor_props:
      - cracked phone case
      - admissions-prep notebook
  heroine:
    canonical_name: 윤서하
    role: contract-department scholarship student
    identity_core:
      age_impression: early twenties Korean female student
      body_build: lean, upright, controlled posture
      narrative_pressure: precision and status anxiety hidden behind calm delivery
    visual_invariants:
      hair:
        - dark straight hair
        - controlled silhouette
      face:
        - sharp eyes
        - composed expression line
        - clean jawline
      wardrobe:
        - dark tailored campus jacket
        - understated smart-casual layers
    default_expression_baseline:
      neutral: cool calculation with minimal wasted motion
      pressure: composure thins before voice does
    forbidden_drift:
      - no bubbly school-idol styling
      - no oversized streetwear silhouette
      - no warm goofy facial acting
    anchor_props:
      - silver laptop
      - espresso cup
  sora:
    canonical_name: 한소라
    role: study mate and emotional truth-teller
    identity_core:
      age_impression: early twenties Korean female student
      body_build: soft, observant campus silhouette
      narrative_pressure: empathetic concern sharpened into jealousy
    visual_invariants:
      hair:
        - natural dark hair
        - practical campus styling
      face:
        - open eyes
        - soft but alert mouth line
      wardrobe:
        - casual campus wear
        - practical outer layer
    default_expression_baseline:
      neutral: observant warmth
      hurt: concern turns tight and glassy
    forbidden_drift:
      - no aggressive glam styling
      - no severe angular posture
      - no unreadable poker-face acting
    anchor_props:
      - phone with voice-message screen
      - campus tote
  minwoo:
    canonical_name: 조민우
    role: older campus senior who weaponizes gossip
    identity_core:
      age_impression: mid twenties Korean male senior
      body_build: confident, well-groomed senior silhouette
      narrative_pressure: social dominance through casual needling
    visual_invariants:
      hair:
        - polished dark hair
      face:
        - smug smile line
        - evaluating gaze
      wardrobe:
        - neat senior-campus styling
    default_expression_baseline:
      neutral: amused superiority
      provocation: small smile before escalation
    forbidden_drift:
      - no sloppy student styling
      - no timid body language
    anchor_props:
      - gossip-thread phone
  mother:
    canonical_name: 시윤의 어머니
    role: restrained middle-aged parent
    identity_core:
      age_impression: middle-aged Korean woman
      body_build: slim-to-average, slightly narrowed posture
      narrative_pressure: disappointment expressed through control rather than volume
    visual_invariants:
      hair:
        - dark hair tied low
        - clean center part
      face:
        - long oval face
        - tired sharp eyes
      wardrobe:
        - simple beige homewear
    default_expression_baseline:
      neutral: emotionally restrained observation
      anger: cold restraint before open reaction
    forbidden_drift:
      - no youthful makeup styling
      - no bob cut
      - no playful expressions
    anchor_props:
      - home hallway backlight
