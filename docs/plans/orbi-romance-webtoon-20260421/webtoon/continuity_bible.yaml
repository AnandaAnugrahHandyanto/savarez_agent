    carry_props:
      - silver laptop
      - espresso cup
    allowed_variation:
      - jacket open or closed
      - cup or laptop in hand
    forbidden_variation:
      - no pastel idol look
      - no oversized hoodie
  sora_casual_campus:
    character_id: sora
    garments:
