  style_positive: "mainstream Korean teen webtoon aesthetic, clean Naver-style school drama lineart, polished digital manhwa illustration, stylized not photorealistic, youthful late-teen face proportions, soft cel shading, semi-flat clean colors, smooth even pale skin, grouped hair clumps instead of realistic strands, simplified Korean school or study-room background, mobile-readable vertical webtoon composition"
  character_lock: "same protagonist design in every panel, pale slim Korean male student, messy medium-length black layered hair with long bangs covering the eyebrows, narrow tired almond eyes with visible dark circles, small sharp face with pointed jawline, thin lips, dark plain sweatshirt or faded black hoodie, narrow shoulders, thin neck, quiet depressed intensity"
