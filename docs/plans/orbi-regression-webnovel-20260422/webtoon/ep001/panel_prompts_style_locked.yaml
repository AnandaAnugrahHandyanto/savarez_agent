    - photorealism
    - live-action look
    - cinematic prestige-drama lighting
    - skin pores
    - painterly skin texture
    - realistic hair strands
    - glossy idol styling
    - mature adult facial structure
    - broad shoulders
    - thick neck
    - gritty noir manhwa rendering
    - western comic style
    - 3D render
    - watermark
    - logo
    - speech bubbles generated by the model
  setting_guardrails:
    - grounded Korean exam-drama props and interiors
    - selective detail, simplified background treatment
    - emotional readability first at phone-screen size
