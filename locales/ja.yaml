  '182': browser_navigate returns a page snapshot automatically — no need to call browser_snapshot after.
  '183': browser_vision with annotate=true overlays numbered labels on interactive elements.
  '184': MCP servers are configured in config.yaml — both stdio and HTTP transports supported.
  '185': 'Per-server tool filtering: tools.include whitelists and tools.exclude blacklists specific tools.'
  '186': MCP servers auto-generate toolsets at runtime — hermes tools can toggle them per platform.
  '187': 'MCP OAuth support: auth: oauth enables browser-based authorization with PKCE.'
  '188': Checkpoints have zero overhead when no files are modified — enabled by default.
  '189': A pre-rollback snapshot is saved automatically so you can undo the undo.
