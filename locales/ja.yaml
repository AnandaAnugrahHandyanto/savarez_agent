  '208': credential_pool_strategies supports fill_first, round_robin, least_used, and random rotation.
  '209': hermes login supports OAuth-based auth for Nous and OpenAI Codex providers.
  '210': The API server supports both Chat Completions and Responses API with server-side state.
  '211': 'tool_preview_length: 0 in config shows full file paths in the spinner''s activity feed.'
  '212': hermes status --deep runs deeper diagnostic checks across all components.
  '213': Cron jobs can attach a Python script (--script) whose stdout is injected into the prompt as context.
  '214': Cron scripts live in ~/.hermes/scripts/ and run before the agent — perfect for data collection pipelines.
  '215': prefill_messages_file in config.yaml injects few-shot examples into every API call, never saved to history.
  '216': SOUL.md completely replaces the agent's default identity — rewrite it to make Hermes your own.
