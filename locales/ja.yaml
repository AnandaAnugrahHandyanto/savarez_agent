  083: 'Save money: hermes tools disables unused tools, hermes skills config trims skills down.'
  084: /reasoning low or /reasoning minimal cuts thinking depth below the default (medium) — faster, cheaper responses.
  085: hermes models routes vision, compression, and aux tasks to cheaper models — cuts background token cost 85%+ without
    downgrading your main chat model.
  086: 'Set display.bell_on_complete: true in config.yaml to hear a bell when long tasks finish.'
  087: 'Set display.streaming: true to see tokens appear in real time as the model generates.'
  088: 'Set display.show_reasoning: true to watch the model''s chain-of-thought reasoning.'
  089: 'Set display.compact: true to reduce whitespace in output for denser information.'
  090: 'Set display.busy_input_mode: queue to queue messages instead of interrupting the agent, or steer to inject them mid-run
    via /steer.'
  091: 'Set display.resume_display: minimal to skip the full conversation recap on session resume.'
  092: 'Set compression.threshold: 0.50 to control when auto-compression fires (default: 50% of context).'
