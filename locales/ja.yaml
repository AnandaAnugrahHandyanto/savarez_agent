  '134': hermes sessions export backup.jsonl exports all sessions for backup or analysis.
  '135': hermes -r SESSION_ID resumes any specific past session by its ID.
  '136': Memory is a frozen snapshot — changes appear in the system prompt only at next session start.
  '137': Memory entries are automatically scanned for prompt injection and exfiltration patterns.
  '138': 'The agent has two memory stores: personal notes (~2200 chars) and user profile (~1375 chars).'
  '139': Corrections you give the agent (\"no, do it this way\") are often auto-saved to memory.
  '140': Over 80 bundled skills covering github, creative, mlops, productivity, research, and more.
  '141': Every installed skill automatically becomes a slash command — type / to see them all.
  '142': hermes skills install official/security/1password installs optional skills from the repo.
  '143': Skills can restrict to specific OS platforms — some only load on macOS or Linux.
  '144': skills.external_dirs in config.yaml lets you load skills from custom directories.
