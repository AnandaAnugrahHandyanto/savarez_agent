  '199': Prompt caching (Anthropic) reduces costs by reusing cached system prompt prefixes.
  '200': The agent auto-generates session titles in a background thread — zero latency impact.
  '201': Smart model routing can auto-route simple queries to a cheaper model.
  '202': 'Slash commands support prefix matching: /h resolves to /help, /mod to /model.'
  '203': Dragging a file path into the terminal auto-attaches images or sends as context.
  '204': .worktreeinclude in your repo root lists gitignored files to copy into worktrees.
  '205': hermes acp runs Hermes as an ACP server for VS Code, Zed, and JetBrains integration.
