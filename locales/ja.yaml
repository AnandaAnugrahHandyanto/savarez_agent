  '218': /compress <focus topic> allocates 60-70% of the summary budget to your topic and aggressively trims the rest.
  '219': On second+ compression, the compressor updates the previous summary instead of starting from scratch.
  '220': Before a gateway session reset, Hermes auto-flushes important facts to memory in the background.
  '221': 'network.force_ipv4: true in config.yaml fixes hangs on servers with broken IPv6 — monkey-patches socket.'
  '222': 'The terminal tool annotates common exit codes: grep returning 1 = ''No matches found (not an error)''.'
  '223': Failed foreground terminal commands auto-retry up to 3 times with exponential backoff (2s, 4s, 8s).
  '224': Bare sudo commands are auto-rewritten to pipe SUDO_PASSWORD from .env — no interactive prompt needed.
  '225': 'execute_code has built-in helpers: json_parse() for tolerant parsing, shell_quote(), and retry() with backoff.'
  '226': execute_code's 7 sandbox tools (web_search, terminal, read/write/search/patch) use RPC — never enter context.
  '227': Reading the same file region 3+ times triggers a warning. At 4+, it's hard-blocked to prevent loops.
