tip:
  '001': /background <prompt> (alias /bg or /btw) runs a task in a separate session while your current one stays free.
  '002': /branch forks the current session so you can explore a different direction without losing progress.
  '003': /compress manually compresses conversation context when things get long.
  '004': /rollback lists filesystem checkpoints — restore files the agent modified to any prior state.
  '005': /rollback diff 2 previews what changed since checkpoint 2 without restoring anything.
  '006': /rollback 2 src/file.py restores a single file from a specific checkpoint.
  '007': /title \"my project\" names your session — resume it later with /resume or hermes -c.
  008: /resume picks up where you left off in a previously named session.
  009: /queue <prompt> queues a message for the next turn without interrupting the current one.
  '010': /undo removes the last user/assistant exchange from the conversation.
  '011': /retry resends your last message — useful when the agent's response wasn't quite right.
  '012': '/verbose cycles tool progress display: off → new → all → verbose.'
  '013': /reasoning high increases the model's thinking depth. /reasoning show displays the reasoning.
  '014': /fast toggles priority processing for faster API responses (provider-dependent).
  '015': /yolo skips all dangerous command approval prompts for the rest of the session.
  '016': /model lets you switch models mid-session — try /model sonnet or /model gpt-5.
  '017': /model --global changes your default model permanently.
  018: /personality pirate sets a fun personality — 14 built-in options from kawaii to shakespeare.
  019: /skin changes the CLI theme — try ares, mono, slate, poseidon, or charizard.
  '020': /statusbar toggles a persistent bar showing model, tokens, context fill %, cost, and duration.
  '021': /tools disable browser temporarily removes browser tools for the current session.
  '022': /browser connect attaches browser tools to your running Chrome instance via CDP.
  '023': /plugins lists installed plugins and their status.
  '024': /cron manages scheduled tasks — set up recurring prompts with delivery to any platform.
  '025': /reload-mcp hot-reloads MCP server configuration without restarting.
  '026': /usage shows token usage, cost breakdown, and session duration.
  '027': /insights shows usage analytics for the last 30 days.
  028: /paste checks your clipboard for an image and attaches it to your next message.
  029: /profile shows which profile is active and its home directory.
  '030': /config shows your current configuration at a glance.
  '031': /stop kills all running background processes spawned by the agent.
  '032': '@file:path/to/file.py injects file contents directly into your message.'
  '033': '@file:main.py:10-50 injects only lines 10-50 of a file.'
  '034': '@folder:src/ injects a directory tree listing.'
  '035': '@diff injects your unstaged git changes into the message.'
  '036': '@staged injects your staged git changes (git diff --staged).'
  '037': '@git:5 injects the last 5 commits with full patches.'
  038: '@url:https://example.com fetches and injects a web page''s content.'
  039: Typing @ triggers filesystem path completion — navigate to any file interactively.
  '040': 'Combine multiple references: \"Review @file:main.py and @file:test.py for consistency.\"'
  '041': Alt+Enter inserts a newline for multi-line input. (Windows Terminal intercepts Alt+Enter — use Ctrl+Enter instead.)
  '042': Ctrl+C interrupts the agent. Double-press within 2 seconds to force exit.
  '043': Ctrl+Z suspends Hermes to the background — run fg in your shell to resume.
  '044': Tab accepts auto-suggestion ghost text or autocompletes slash commands.
  '045': Type a new message while the agent is working to interrupt and redirect it.
  '046': Alt+V pastes an image from your clipboard into the conversation.
  '047': Pasting 5+ lines auto-saves to a file and inserts a compact reference instead.
  048: hermes -c resumes your most recent CLI session. hermes -c \"project name\" resumes by title.
  049: hermes -w creates an isolated git worktree — perfect for parallel agent workflows.
  '050': 'hermes -w -q \"Fix issue #42\" combines worktree isolation with a one-shot query.'
  '051': hermes chat -t web,terminal enables only specific toolsets for a focused session.
  '052': hermes chat -s github-pr-workflow preloads a skill at launch.
  '053': hermes chat -q \"query\" runs a single non-interactive query and exits.
  '054': hermes chat --max-turns 200 overrides the default 90-iteration limit per turn.
  '055': hermes chat --checkpoints enables filesystem snapshots before every destructive file change.
  '056': hermes --yolo bypasses all dangerous command approval prompts for the entire session.
  '057': hermes chat --source telegram tags the session for filtering in hermes sessions list.
  058: hermes -p work chat runs under a specific profile without changing your default.
  059: hermes doctor --fix diagnoses and auto-repairs config and dependency issues.
  '060': hermes dump outputs a compact setup summary — great for bug reports.
  '061': hermes config set KEY VALUE auto-routes secrets to .env and everything else to config.yaml.
  '062': hermes config edit opens config.yaml in your default editor.
  '063': hermes config check scans for missing or stale configuration options.
  '064': hermes sessions browse opens an interactive session picker with search.
  '065': hermes sessions stats shows session counts by platform and database size.
  '066': hermes sessions prune --older-than 30 cleans up old sessions.
  '067': hermes skills search react --source skills-sh searches the skills.sh public directory.
  068: hermes skills check scans installed hub skills for upstream updates.
  069: hermes skills tap add myorg/skills-repo adds a custom GitHub skill source.
  '070': hermes skills snapshot export setup.json exports your skill configuration for backup or sharing.
  '071': hermes mcp add github --command npx adds MCP servers from the command line.
  '072': hermes mcp serve runs Hermes itself as an MCP server for other agents.
  '073': hermes auth add lets you add multiple API keys for credential pool rotation.
  '074': hermes completion bash >> ~/.bashrc enables tab completion for all commands and profiles.
  '075': hermes logs -f follows agent.log in real time. --level WARNING --since 1h filters output.
  '076': hermes backup creates a zip backup of your entire Hermes home directory.
  '077': hermes profile create coder creates an isolated profile that becomes its own command.
  078: hermes profile create work --clone copies your current config and keys to a new profile.
  079: hermes update syncs new bundled skills to ALL profiles automatically.
  080: hermes gateway install sets up Hermes as a system service (systemd/launchd).
