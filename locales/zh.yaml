  '133': 退出时，Hermes 会打印带有会话 ID 和统计信息的恢复命令。
  '134': hermes sessions export backup.jsonl 导出所有会话，用于备份或分析。
  '135': hermes -r SESSION_ID 通过其 ID 恢复任何特定过往会话。
