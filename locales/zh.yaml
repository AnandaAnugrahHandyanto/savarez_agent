  choose_long:     "      [o]仅此一次  |  [s]本次会话  |  [a]永久允许  |  [d]拒绝"
  choose_short:    "      [o]仅此一次  |  [s]本次会话  |  [d]拒绝"
  prompt_long:     "      选择 [o/s/a/D]: "
  prompt_short:    "      选择 [o/s/D]: "
  timeout:         "      ⏱ 超时 — 已拒绝命令"
  allowed_once:    "      ✓ 本次允许"
  allowed_session: "      ✓ 本次会话内允许"
  allowed_always:  "      ✓ 已加入永久允许列表"
  denied:          "      ✗ 已拒绝"
  cancelled:       "      ✗ 已取消"
  blocklist_message: "此命令位于无条件拦截列表中，无法被批准。"

gateway:
