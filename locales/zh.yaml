  '152': 语音模式如果安装了 faster-whisper 即可使用零 API 密钥（免费本地语音转文本）。
  '153': 提供五个 TTS 提供商：Edge TTS（免费）、ElevenLabs、OpenAI、NeuTTS（免费本地）、MiniMax。
