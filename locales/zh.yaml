  '141': 每个已安装的技能会自动成为斜杠命令——输入 / 即可查看全部。
  '142': hermes skills install official/security/1password 从仓库安装可选技能。
  '143': 技能可以限制在特定操作系统平台——有些仅在 macOS 或 Linux 上加载。
