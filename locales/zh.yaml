  '137': 内存条目会自动扫描提示词注入和窃取模式。
  '138': 智能体有两个内存存储：个人笔记（约 2200 字符）和用户档案（约 1375 字符）。
  '139': 您给智能体的修正（"不，这样操作"）通常会自动保存到内存中。
