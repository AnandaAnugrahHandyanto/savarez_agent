tip:
  '001': /background <prompt>（别名 /bg 或 /btw）在独立会话中运行任务，同时让您的当前会话保持空闲。
  '002': /branch 分叉当前会话，让您在不丢失进度的情况下探索不同方向。
  '003': /compress 手动压缩对话上下文，适用于内容较长的情况。
  '004': /rollback 列出文件系统检查点——将代理修改的文件恢复到任意先前状态。
  '005': /rollback diff 2 预览自检查点 2 以来发生了哪些更改，无需恢复任何内容。
  '006': /rollback 2 src/file.py 从特定检查点恢复单个文件。
  '007': /title \"我的项目\" 命名会话——稍后用 /resume 或 hermes -c 恢复。
  008: /resume 从之前命名的会话中继续之前的位置。
  009: /queue <prompt> 将消息排队到下一轮，不会中断当前会话。
  '010': /undo 从对话中移除最后一次用户/助手交互。
  '011': /retry 重发您的最后一条消息——当代理的回复不够准确时很有用。
  '012': /verbose 循环工具进度显示：关闭 → 新 → 全部 → 详细。
  '013': /reasoning high 增加模型的思考深度。/reasoning show 显示推理过程。
  '014': /fast 切换优先级处理以获取更快的 API 响应（取决于提供商）。
  '015': /yolo 跳过会话中剩余部分的危险命令批准提示。
  '016': /model 让您在会话中切换模型——尝试 /model sonnet 或 /model gpt-5。
  '017': /model --global 永久更改默认模型。
  018: /personality pirate 设置有趣的个性——14 个内置选项，从可爱到莎士比亚。
  019: /skin 更改 CLI 主题——尝试 ares、mono、slate、poseidon 或 charizard。
  '020': /statusbar 切换持久状态栏，显示模型、令牌、上下文填充百分比、费用和时长。
  '021': /tools disable 浏览器临时禁用当前会话的浏览器工具。
  '022': /browser connect 通过 CDP 将浏览器工具附加到正在运行的 Chrome 实例。
  '023': /plugins 列出已安装的插件及其状态。
  '024': /cron 管理定时任务——设置可重复提示并发送到任何平台。
  '025': /reload-mcp 无需重启即可热重载 MCP 服务器配置。
  '026': /usage 显示令牌使用量、成本明细和会话时长。
  '027': /insights 显示过去 30 天的使用分析。
  028: /paste 检查剪贴板中的图像并附加到下一条消息。
  029: /profile 显示当前激活的配置文件及其主目录。
  '030': /config 概览显示当前配置。
  '031': /stop 终止代理启动的所有后台进程。
  '032': '@file:path/to/file.py 直接将文件内容注入到消息中。'
  '033': '@file:main.py:10-50 仅注入文件的第 10-50 行。'
  '034': '@folder:src/ 注入目录树列表。'
  '035': '@diff 将未暂存的 git 更改注入到消息中。'
  '036': '@staged 注入已暂存的 git 更改（git diff --staged）。'
  '037': '@git:5 注入最近的 5 个提交及其完整补丁。'
  038: '@url:https://example.com 获取并注入网页内容。'
  039: 输入 @ 触发文件系统路径补全——交互式导航到任何文件。
  '040': 组合多个引用："Review @file:main.py and @file:test.py for consistency."
  '041': Alt+Enter 用于多行输入时插入换行符。（Windows Terminal 会拦截 Alt+Enter — 改用 Ctrl+Enter）
  '042': Ctrl+C 中断代理。在 2 秒内双击强制退出。
  '043': Ctrl+Z 将 Hermes 挂起到后台 — 在 shell 中运行 fg 恢复。
  '044': Tab 接受自动建议的幽灵文本或自动补全斜杠命令。
  '045': 代理工作时输入新消息可中断并重定向它。
  '046': Alt+V 从剪贴板粘贴图像到对话中。
  '047': 粘贴 5 行以上自动保存到文件并插入紧凑引用。
  048: hermes -c 恢复最近的 CLI 会话。hermes -c "project name" 按标题恢复。
  049: hermes -w 创建隔离的 git 工作树 — 非常适合并行代理工作流。
  '050': 'hermes -w -q "Fix issue #42" 结合工作树隔离与一次性查询。'
  '051': hermes chat -t web,terminal 为专注会话启用特定工具集。
  '052': hermes chat -s github-pr-workflow 启动时预加载技能。
  '053': hermes chat -q "query" 运行单次非交互式查询并退出。
  '054': hermes chat --max-turns 200 覆盖每轮默认的 90 次迭代限制。
  '055': hermes chat --checkpoints 在每个破坏性文件更改前启用文件系统快照。
  '056': hermes --yolo 绕过整个会话的所有危险命令批准提示。
  '057': hermes chat --source telegram 标记会话以便在 hermes 会话列表中筛选。
  058: hermes -p work chat 在特定配置文件下运行而不更改默认设置。
  059: hermes doctor --fix 诊断并自动修复配置和依赖问题。
  '060': hermes dump 输出紧凑的设置摘要 — 非常适合故障报告。
  '061': hermes config set KEY VALUE 自动将密钥路由到.env，其他所有内容路由到 config.yaml。
  '062': hermes config edit 用默认编辑器打开 config.yaml。
  '063': hermes config check 扫描缺失或过期的配置选项。
  '064': hermes sessions browse 打开带搜索功能的交互式会话选择器。
  '065': hermes sessions stats 按平台和数据库大小显示会话计数。
  '066': hermes sessions prune --older-than 30 清理旧会话。
  '067': hermes skills search react --source skills-sh 搜索 skills.sh 公开目录。
  068: hermes skills check 扫描已安装的 hub 技能以查找上游更新。
  069: hermes skills tap add myorg/skills-repo 添加自定义 GitHub 技能源。
  '070': hermes skills snapshot export setup.json 导出技能配置用于备份或共享。
  '071': hermes mcp add github --command npx 从命令行添加 MCP 服务器。
  '072': hermes mcp serve 将 Hermes 本身作为 MCP 服务器运行，供其他代理使用。
  '073': hermes auth add 允许添加多个 API 密钥用于凭据池轮换。
  '074': hermes completion bash >> ~/.bashrc 为所有命令和配置文件启用标签补全。
  '075': hermes logs -f 实时跟踪 agent.log。--level WARNING --since 1h 过滤输出。
  '076': hermes backup 创建 Hermes 主目录的 zip 备份。
  '077': hermes profile create coder 创建隔离的配置文件，使其成为独立命令。
  078: hermes profile create work --clone 复制当前配置和密钥到新配置文件。
  079: hermes update 自动将新捆绑技能同步到所有配置文件。
  080: hermes gateway install 将 Hermes 配置为系统服务（systemd/launchd）。
  081: hermes 记忆设置允许您配置外部记忆提供者（Honcho、Mem0 等）。
  082: hermes webhook 订阅创建带有 HMAC 验证的事件驱动 webhook 路由。
  083: 节省开支：hermes 工具禁用未使用的工具，hermes 技能配置精简技能。
  084: /reasoning low 或 /reasoning minimal 将思维深度降低至默认值（medium）以下——响应更快、更便宜。
  085: hermes 模型将视觉、压缩和辅助任务路由到更便宜的模型——在不降级主聊天模型的情况下降低背景 token 成本 85%+。
  086: '在 config.yaml 中设置 display.bell_on_complete: true 以便在长时间任务完成时听到铃声。'
  087: '设置 display.streaming: true 以便实时看到 token 在模型生成时出现。'
  088: '设置 display.show_reasoning: true 以便观察模型的思维链推理。'
  089: '设置 display.compact: true 以减少输出中的空白，以便更紧凑的信息。'
  090: '设置 display.busy_input_mode: queue 以便将消息排队而不是中断代理，或者通过 /steer 在运行中途注入它们。'
  091: '设置 display.resume_display: minimal 以便在会话恢复时跳过完整的对话摘要。'
  092: '设置 compression.threshold: 0.50 以控制自动压缩何时触发（默认：上下文 50%）。'
  093: '设置 agent.max_turns: 200 以便让代理每次轮次执行更多工具调用步骤。'
  094: '设置 file_read_max_chars: 200000 以增加每次 read_file 调用的最大内容。'
  095: '设置 approvals.mode: smart 以便让 LLM 自动批准安全命令并自动拒绝危险命令。'
  096: 在 config.yaml 中设置 fallback_model 以自动切换到备用提供者。
  097: '设置 privacy.redact_pii: true 以便在向 LLM 发送之前对用户 ID 和电话号码进行哈希处理。'
  098: '设置 browser.record_sessions: true 以便自动将浏览器会话记录为 WebM 视频。'
  099: '在 config.yaml 中设置 worktree: true 以始终创建 git worktree（与 hermes -w 相同）。'
  '100': '设置 security.website_blocklist.enabled: true 以阻止特定域名从 Web 工具中访问。'
  '101': '设置 cron.wrap_response: false 以在不包含 cron 标题/页脚的情况下交付原始代理输出。'
  '102': HERMES_TIMEZONE 使用任何 IANA 时区字符串覆盖服务器时区。
  '103': 环境变量替换在 config.yaml 中有效：使用 ${VAR_NAME} 语法。
  '104': config.yaml 中的快速命令可立即运行 shell 命令，且无 token 消耗。
  '105': 自定义个性可在 config.yaml 的 agent.personalities 下定义。
  '106': provider_routing 控制 OpenRouter 提供商的排序、白名单和黑名单。
  '107': execute_code 运行调用 Hermes 工具的 Python 脚本——结果保持独立，不进入上下文。
  '108': delegate_task 默认最多启动 3 个并发子代理（delegation.max_concurrent_children），通过隔离上下文支持并行工作。
  '109': web_extract 支持 PDF 链接——传入任意 PDF 链接即可转换为 Markdown。
  '110': search_files 基于 ripgrep，比终端 grep 更快——用其替代 grep。
  '111': patch 采用 9 种模糊匹配策略，确保微小空白差异不会破坏编辑。
  '112': patch 支持 V4A 格式，可在单次调用中批量编辑多文件。
  '113': read_file 在文件未找到时推荐相似文件名。
  '114': read_file 自动去重——重新读取未修改的文件会返回轻量级占位符。
  '115': browser_vision 截取屏幕截图并用 AI 分析——适用于验证码和视觉内容。
  '116': browser_console 可在页面上下文中评估 JavaScript 表达式。
  '117': image_generate 使用 FLUX 2 Pro 创建图像，并自动 2 倍放大。
  '118': text_to_speech 将文本转换为音频——在 Telegram 中作为语音气泡播放。
  '119': send_message 可从会话内访问任何已连接的即时通讯平台。
  '120': todo 工具帮助代理在会话期间跟踪复杂的多步骤任务。
  '121': session_search 在所有过往对话中进行全文搜索。
  '122': 智能体会自动将偏好设置、修正和环境事实保存到内存中。
  '123': mixture_of_agents 通过 4 个前沿大语言模型协作路由难题。
  '124': 终端命令支持带有 notify_on_complete 的后台模式，适用于长时间运行的任务。
  '125': 终端后台进程支持 watch_patterns，用于在特定输出行时发出提醒。
  '126': 终端工具支持 6 个后端：local、Docker、SSH、Modal、Daytona 和 Singularity。
  '127': 每个配置文件都有独立的配置、API 密钥、内存、会话、技能和定时任务。
  '128': 配置文件名变为 shell 命令——'hermes profile create coder' 创建 'coder' 命令。
  '129': hermes profile export coder -o backup.tar.gz 创建可移植的配置文件归档。
  '130': 如果两个配置文件意外共享机器人令牌，第二个网关会被阻止并显示清晰的错误信息。
