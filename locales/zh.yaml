  '365': HERMES_STREAM_RETRIES (默认 3) 控制临时网络错误时的流中断重连尝试次数。
  '366': HERMES_GATEWAY_BUSY_ACK_ENABLED=false 当用户向忙碌的代理发送消息时，静默 ⚡/⏳/⏩ 确认消息。
  '367': HERMES_AGENT_NOTIFY_INTERVAL (默认 180 秒) 设置网关在长时间对话中多久发送一次进度 ping。
  '368': HERMES_RESTART_DRAIN_TIMEOUT (默认 900 秒) 限制 /restart 在强制重启前等待运行中的任务时长。
  '369': HERMES_CHECKPOINT_TIMEOUT (默认 30 秒) 限制文件系统检查点创建时间——大型单仓库项目请调高此值。
  '370': config.yaml 中的 image_gen.model 选择 FAL 模型：flux-2/klein、gpt-image-2、nano-banana-pro 等。
  '371': image_gen.provider 通过插件（OpenAI Images、Codex、FAL）而非默认方式路由图像生成。
  '372': AUXILIARY_VISION_BASE_URL + AUXILIARY_VISION_API_KEY 将视觉分析指向任何兼容 OpenAI 的端点。
  '373': 'security.tirith_fail_open: false 使 Hermes 在 tirith 扫描器自身出错时阻止命令。'
  '374': TIRITH_FAIL_OPEN 环境变量覆盖 tirith_fail_open 配置——无需编辑 config.yaml 即可快速切换。
  '375': 默认情况下，--source 工具聊天不会被排除在 hermes 会话列表之外——显式设置 --source 即可查看它们。
  '376': 会话 ID 带有时间戳前缀（20250305_091523_abcd），因此 ls 和 jq 可以自然排序。
  '377': API_SERVER_MODEL_NAME 自定义 /v1/models 上的模型名称——多配置文件 Open WebUI 设置所必需。
  '378': 仪表板插件从 /dashboard-plugins/<name>/ 提供——将文件放入 ~/.hermes/dashboard-plugins/。
cmd:
  new: 开始新会话（新的会话 ID 和历史记录）
  topic: 启用或检查 Telegram DM 主题会话
  clear: 清除屏幕并开始新会话
  redraw: 强制刷新整个 UI（从终端漂移恢复）
  history: 显示对话历史
  save: 保存当前对话
  retry: 重试最后一条消息（重新发送给代理）
  undo: 移除最后的用户/助手交互
  title: 为当前会话设置标题
  handoff: 将会话移交到消息平台（Telegram、Discord 等）
  branch: 分支当前会话（探索不同方向）
  compress: 手动压缩对话上下文
  rollback: 列出或恢复文件系统检查点
  snapshot: 创建或恢复 Hermes 配置/状态快照
  stop: 终止所有运行中的后台进程
  approve: 批准待处理的危险命令
  deny: 拒绝待处理的危险命令
  background: 在后台运行提示
  agents: 显示活跃代理和运行中的任务
  queue: 将提示排队到下一轮（不中断）
  steer: 在下次工具调用后注入消息而不中断
  goal: 设置 Hermes 跨轮次工作的目标直到实现
  subgoal: 在活跃目标上添加或管理额外条件
  status: 显示会话信息
  whoami: 显示你的斜杠命令访问权限（管理员/用户）
  profile: 显示活跃配置名称和主目录
  sethome: 将此聊天设为主频道
  resume: 恢复之前命名的会话
  sessions: 浏览和恢复之前的会话
  config: 显示当前配置
  model: 切换此会话的模型
  codex-runtime: 切换 OpenAI/Codex 模型的 codex 应用服务器运行时
  gquota: 显示 Google Gemini Code Assist 配额使用情况
  personality: 设置预定义人格
  statusbar: 切换上下文/模型状态栏
  verbose: 循环工具进度显示：关闭 -> 新建 -> 全部 -> 详细
  footer: 切换网关最终回复的运行时元数据页脚
  yolo: 切换 YOLO 模式（跳过所有危险命令批准）
  reasoning: 管理推理努力和显示
  fast: 切换快速模式 — OpenAI 优先处理/Anthropic 快速模式（普通/快速）
  skin: 显示或更改显示皮肤/主题
  indicator: 选择 TUI 忙指示器样式
  voice: 切换语音模式
  busy: 控制 Hermes 工作时 Enter 键的行为
  tools: 管理工具：/tools [list|disable|enable] [name...]
  toolsets: 列出可用的工具集
  skills: 搜索、安装、检查或管理技能
  cron: 管理定时任务
  curator: 后台技能维护（状态、运行、固定、归档、列出已归档）
  kanban: 多配置协作看板（任务、链接、评论）
  reload: 重新加载 .env 变量到运行中的会话
  reload-mcp: 从配置重新加载 MCP 服务器
  reload-skills: 重新扫描 ~/.hermes/skills/ 查找新安装或移除的技能
  browser: 通过 CDP 连接浏览器工具到你的实时 Chrome
  plugins: 列出已安装的插件及其状态
  commands: 浏览所有命令和技能（分页）
  help: 显示可用命令
  restart: 在排空活跃运行后优雅重启网关
  usage: 显示当前会话的 token 使用情况和速率限制
  insights: 显示使用洞察和分析
  platforms: 显示网关/消息平台状态
  platform: 暂停、恢复或列出失败的网关平台
  copy: 复制最后助手回复到剪贴板
  paste: 从剪贴板附加图片
  image: 附加本地图片文件到你的下次提示
  update: 更新 Hermes Agent 到最新版本
  debug: 上传调试报告（系统信息+日志）并获取可分享链接
  quit: 退出 CLI（使用 --delete 也移除会话历史）
