  no_response_nonstreaming: "⚠️ 提供商 {elapsed}s 无响应（非流式，模型：{model}）。正在中止调用。"
  connection_dropped_toolcall: "⚠️ 工具调用中连接断开（{error}）。正在重连…（第 {attempt}/{total} 次尝试）"
