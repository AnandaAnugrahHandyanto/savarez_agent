  '219': On second+ compression, the compressor updates the previous summary instead of starting from scratch.
  '220': Before a gateway session reset, Hermes auto-flushes important facts to memory in the background.
  '221': 'network.force_ipv4: true in config.yaml fixes hangs on servers with broken IPv6 — monkey-patches socket.'
  '222': 'The terminal tool annotates common exit codes: grep returning 1 = ''No matches found (not an error)''.'
  '223': Failed foreground terminal commands auto-retry up to 3 times with exponential backoff (2s, 4s, 8s).
