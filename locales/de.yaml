  '294': cronjob with no_agent=True runs a script on schedule and sends its stdout directly — zero tokens, zero LLM.
  '295': An empty cron script stdout means silent tick — nothing is delivered, perfect for threshold watchdogs.
  '296': HERMES_CRON_MAX_PARALLEL (default 4) caps how many cron jobs run per tick so bursts don't saturate your keys.
  '297': Gateway hooks live under ~/.hermes/hooks/<name>/ with HOOK.yaml + handler.py — handler must be named `handle`.
  '298': Hook events include gateway:startup, session:start, agent:step, and command:* wildcard subscriptions.
  '299': Drop a ~/.hermes/BOOT.md checklist and a gateway:startup hook runs it as a one-shot agent every boot.
  '300': hermes curator run --dry-run previews what the curator would archive or consolidate without mutating anything.
  '301': hermes curator pin <skill> hard-fences a skill against both auto-archival and the agent's skill_manage tool.
  '302': hermes curator rollback restores skills from a pre-run snapshot — backups live under skills/.curator_backups/.
  '303': hermes auth reset <provider> clears all cooldowns and exhaustion flags on a credential pool.
  '304': 'credential_pool_strategies.<provider>: round_robin cycles keys evenly instead of the fill_first default.'
  '305': 'use_gateway: true per-tool routes web, image, tts, or browser through your Nous subscription — no extra keys.'
  '306': 'provider_routing.data_collection: deny excludes data-storing providers on OpenRouter.'
  '307': 'provider_routing.require_parameters: true only routes to providers that support every param in your request.'
  '308': HERMES_TUI_RESUME=1 auto-re-attaches to the most recent TUI session on launch — handy after SSH drops.
  '309': HERMES_TUI_THEME=light|dark|<hex> forces the TUI theme on terminals that don't set COLORFGBG.
  '310': Ctrl+G or Ctrl+X Ctrl+E in the TUI opens the input buffer in $EDITOR for long multi-line prompts.
  '311': The TUI renders LaTeX inline — $E=mc^2$ becomes Unicode math instead of raw TeX.
  '312': hermes dashboard launches a local web UI at 127.0.0.1:9119 — zero data leaves localhost.
  '313': hermes dashboard --tui embeds the full Hermes TUI in your browser via xterm.js and a WebSocket PTY.
  '314': Drop a YAML in ~/.hermes/dashboard-themes/ with two palette colors to reskin the entire dashboard.
  '315': 'Dashboard plugins are drop-in: manifest.json + JS bundle in ~/.hermes/dashboard-plugins/ — no npm build required.'
  '316': 'layoutVariant: cockpit in a dashboard theme adds a 260px left rail that plugins can populate via the sidebar slot.'
  '317': 'display.tool_progress_command: true exposes /verbose on messaging platforms; it''s CLI-only by default.'
  '318': HERMES_BACKGROUND_NOTIFICATIONS=result only pings when background tasks finish (vs all/error/off).
  '319': HERMES_WRITE_SAFE_ROOT restricts write_file and patch to a directory prefix; writes outside require approval.
  '320': HERMES_IGNORE_RULES skips auto-injection of AGENTS.md, SOUL.md, .cursorrules, memory, and preloaded skills.
  '321': HERMES_ACCEPT_HOOKS auto-approves unseen shell hooks declared in config.yaml without a TTY prompt.
  '322': auxiliary.goal_judge.model routes the /goal judge to a cheap fast model to keep loop cost near zero.
  '323': Checkpoints skip directories with more than 50,000 files to avoid slow git operations on massive monorepos.
  '324': 'tts.provider: piper runs 44-language local TTS on CPU — voices auto-download to ~/.hermes/cache/piper-voices/.'
  '325': 'tts.providers.<name>.type: command wires any CLI TTS engine with {input_path} and {output_path} placeholders.'
  '326': API_SERVER_ENABLED=true runs an OpenAI-compatible endpoint alongside the gateway for Open WebUI and LibreChat.
  '327': 'GATEWAY_PROXY_URL runs a split setup: platform I/O locally, agent work delegated to a remote API server.'
  '328': MATRIX_DEVICE_ID pins a stable device ID for E2EE — without it, keys rotate every start and historic decrypt breaks.
  '329': TELEGRAM_WEBHOOK_SECRET is required whenever TELEGRAM_WEBHOOK_URL is set — generate with openssl rand -hex 32.
  '330': batch_runner.py --resume content-matches completed prompts by text so dataset reorders don't re-run finished work.
  '331': /new starts a fresh session in place (alias /reset) — fresh session ID, clean history, CLI stays open.
  '332': /clear wipes the terminal screen AND starts a new session — one shortcut for a visual reset.
  '333': /history prints the current conversation in-line without leaving the CLI — useful for a quick re-read.
  '334': /save writes the current conversation to disk without ending the session.
  '335': '/status shows session info at a glance: ID, title, model, token usage, and elapsed time.'
  '336': /image <path> attaches a local image file for your next prompt without pasting or drag-and-drop.
  '337': /platforms shows gateway and messaging-platform connection status right from inside chat.
  '338': /commands paginates the full slash-command + installed-skill list — useful on platforms without tab completion.
  '339': /toolsets lists every available toolset so you know what -t/--toolsets accepts.
  '340': /gquota shows Google Gemini Code Assist quota usage with progress bars when that provider is active.
  '341': /voice tts toggles TTS-only mode — agent replies out loud but you still type your prompts.
  '342': /reload-skills re-scans ~/.hermes/skills/ so drop-in skills appear without restarting the session.
  '343': /indicator kaomoji|emoji|unicode|ascii picks the TUI busy-indicator style shown during agent runs.
  '344': /debug uploads a support bundle (system info + logs) and returns shareable links — works in chat too.
  '345': 'hermes -z "<prompt>" is the purest one-shot: final answer on stdout, nothing else — ideal for piping in scripts.'
  '346': hermes chat --pass-session-id injects the session ID into the system prompt so the agent can self-reference it.
  '347': hermes chat --image path/to/pic.png attaches a local image to a single -q query without a separate upload step.
  '348': hermes chat --ignore-user-config skips ~/.hermes/config.yaml — reproducible bug reports and CI runs.
  '349': hermes chat --source tool tags programmatic chats so they don't clutter hermes sessions list.
  '350': hermes dump --show-keys includes redacted API key fingerprints for deeper support debugging.
  '351': hermes sessions rename <ID> "new title" renames any past session; hermes sessions delete <ID> removes one.
  '352': hermes import restores a session export or profile archive produced by sessions export or profile export.
  '353': hermes fallback manages the fallback_model chain interactively — no hand-editing config.yaml.
  '354': hermes pairing rotates the DM pairing token — the first messager after rotation claims access to the bot.
  '355': hermes setup walks first-time users through provider, keys, and platform wiring in one interactive flow.
  '356': hermes status --deep runs the full health sweep across every component; plain hermes status is the quick view.
  '357': HERMES_AGENT_TIMEOUT=0 disables the gateway inactivity kill for a running agent — use for long research runs.
  '358': HERMES_ENABLE_PROJECT_PLUGINS=1 auto-loads repo-local plugins from ./.hermes/plugins/ — trust-gated by design.
  '359': HERMES_DISABLE_FILE_STATE_GUARD=1 turns off the 'file changed since you read it' guard on patch and write_file.
  '360': HERMES_ALLOW_PRIVATE_URLS=true lets web tools hit localhost and private networks — off by default in gateway mode.
  '361': HERMES_OPTIONAL_SKILLS=name1,name2 auto-installs extra optional-catalog skills on first run per profile.
  '362': HERMES_BUNDLED_SKILLS points at a custom bundled-skill tree — used by Homebrew and Nix packaging.
  '363': HERMES_DUMP_REQUEST_STDOUT=1 dumps every API request payload to stdout instead of log files.
  '364': HERMES_OAUTH_TRACE=1 logs redacted OAuth token exchange and refresh attempts for debugging provider auth.
  '365': HERMES_STREAM_RETRIES (default 3) controls mid-stream reconnect attempts on transient network errors.
  '366': HERMES_GATEWAY_BUSY_ACK_ENABLED=false silences the ⚡/⏳/⏩ ack messages when a user messages a busy agent.
  '367': HERMES_AGENT_NOTIFY_INTERVAL (default 180s) sets how often the gateway pings with progress on long turns.
  '368': HERMES_RESTART_DRAIN_TIMEOUT (default 900s) caps how long /restart waits for in-flight runs before forcing.
  '369': HERMES_CHECKPOINT_TIMEOUT (default 30s) caps filesystem checkpoint creation — raise it on huge monorepos.
  '370': 'image_gen.model in config.yaml picks the FAL model: flux-2/klein, gpt-image-2, nano-banana-pro, and more.'
  '371': image_gen.provider routes image generation through a plugin (OpenAI Images, Codex, FAL) instead of the default.
  '372': AUXILIARY_VISION_BASE_URL + AUXILIARY_VISION_API_KEY point vision analysis at any OpenAI-compatible endpoint.
  '373': 'security.tirith_fail_open: false makes Hermes block commands when the tirith scanner itself errors out.'
  '374': TIRITH_FAIL_OPEN env var overrides the tirith_fail_open config — a quick toggle without editing config.yaml.
  '375': --source tool chats are excluded from hermes sessions list by default — set --source explicitly to see them.
  '376': Session IDs are timestamp-prefixed (20250305_091523_abcd) so sorting works naturally in ls and jq.
  '377': API_SERVER_MODEL_NAME customizes the model name on /v1/models — essential for multi-profile Open WebUI setups.
  '378': Dashboard plugins are served from /dashboard-plugins/<name>/ — drop files into ~/.hermes/dashboard-plugins/.
cmd:
  new: Start a new session (fresh session ID + history)
  topic: Enable or inspect Telegram DM topic sessions
  clear: Clear screen and start a new session
  redraw: Force a full UI repaint (recovers from terminal drift)
  history: Show conversation history
  save: Save the current conversation
  retry: Retry the last message (resend to agent)
  undo: Remove the last user/assistant exchange
  title: Set a title for the current session
  handoff: Hand off this session to a messaging platform (Telegram, Discord, etc.)
  branch: Branch the current session (explore a different path)
  compress: Manually compress conversation context
  rollback: List or restore filesystem checkpoints
  snapshot: Create or restore state snapshots of Hermes config/state
  stop: Kill all running background processes
  approve: Approve a pending dangerous command
  deny: Deny a pending dangerous command
  background: Run a prompt in the background
  agents: Show active agents and running tasks
  queue: Queue a prompt for the next turn (doesn't interrupt)
  steer: Inject a message after the next tool call without interrupting
  goal: Set a standing goal Hermes works on across turns until achieved
  subgoal: Add or manage extra criteria on the active goal
  status: Show session info
  whoami: Show your slash command access (admin / user)
  profile: Show active profile name and home directory
  sethome: Set this chat as the home channel
  resume: Resume a previously-named session
  sessions: Browse and resume previous sessions
  config: Show current configuration
  model: Switch model for this session
  codex-runtime: Toggle codex app-server runtime for OpenAI/Codex models
  gquota: Show Google Gemini Code Assist quota usage
  personality: Set a predefined personality
  statusbar: Toggle the context/model status bar
  verbose: 'Cycle tool progress display: off -> new -> all -> verbose'
  footer: Toggle gateway runtime-metadata footer on final replies
  yolo: Toggle YOLO mode (skip all dangerous command approvals)
  reasoning: Manage reasoning effort and display
  fast: Toggle fast mode — OpenAI Priority Processing / Anthropic Fast Mode (Normal/Fast)
  skin: Show or change the display skin/theme
  indicator: Pick the TUI busy-indicator style
  voice: Toggle voice mode
  busy: Control what Enter does while Hermes is working
  tools: 'Manage tools: /tools [list|disable|enable] [name...]'
  toolsets: List available toolsets
  skills: Search, install, inspect, or manage skills
  cron: Manage scheduled tasks
  curator: Background skill maintenance (status, run, pin, archive, list-archived)
  kanban: Multi-profile collaboration board (tasks, links, comments)
  reload: Reload .env variables into the running session
  reload-mcp: Reload MCP servers from config
  reload-skills: Re-scan ~/.hermes/skills/ for newly installed or removed skills
  browser: Connect browser tools to your live Chrome via CDP
  plugins: List installed plugins and their status
  commands: Browse all commands and skills (paginated)
  help: Show available commands
  restart: Gracefully restart the gateway after draining active runs
  usage: Show token usage and rate limits for the current session
  insights: Show usage insights and analytics
  platforms: Show gateway/messaging platform status
  platform: Pause, resume, or list a failing gateway platform
  copy: Copy the last assistant response to clipboard
  paste: Attach clipboard image from your clipboard
  image: Attach a local image file for your next prompt
  update: Update Hermes Agent to the latest version
  debug: Upload debug report (system info + logs) and get shareable links
  quit: Exit the CLI (use --delete to also remove session history)
banner:
  session: 'Session: {session_id}'
  available_tools: Available Tools
  mcp_servers: MCP Servers
  available_skills: Available Skills
  no_skills: No skills installed
  tools_count: '{tools_count} tools'
  skills_count: '{total_skills} skills'
  mcp_count: '{mcp_connected} MCP servers'
  runtime: 'Runtime:'
  profile: 'Profile:'
  behind: ⚠ {behind} {commits_word} behind
  commits: commits
  commit: commit
  codex_note: (terminal/file ops/MCP run inside codex)
  toolsets_note: (and {remaining_toolsets} more toolsets...)
  failed: — failed
