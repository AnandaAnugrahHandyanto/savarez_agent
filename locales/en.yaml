# Hermes static-message catalog -- English (baseline / source of truth)
#
# Only user-facing static messages from the CLI approval prompt and a handful
# of gateway slash-command replies live here.  Agent-generated output, log
# lines, error tracebacks, tool outputs, and slash-command descriptions stay
# in English and are NOT translated -- see agent/i18n.py for scope rationale.
#
# Keys are dotted paths; nesting below is purely for readability.  Values may
# contain {placeholder} tokens for str.format substitution.  When adding a
# new key, add it to EVERY locale file (en/zh/ja/de/es/fr/tr/uk) in the same commit --
# tests/agent/test_i18n.py asserts catalog parity.

approval:
  # CLI approval prompt -- shown when a dangerous command needs user review.
  dangerous_header: "⚠️  DANGEROUS COMMAND: {description}"
  choose_long:     "      [o]nce  |  [s]ession  |  [a]lways  |  [d]eny"
  choose_short:    "      [o]nce  |  [s]ession  |  [d]eny"
  prompt_long:     "      Choice [o/s/a/D]: "
  prompt_short:    "      Choice [o/s/D]: "
  timeout:         "      ⏱ Timeout - denying command"
  allowed_once:    "      ✓ Allowed once"
  allowed_session: "      ✓ Allowed for this session"
  allowed_always:  "      ✓ Added to permanent allowlist"
  denied:          "      ✗ Denied"
  cancelled:       "      ✗ Cancelled"
  blocklist_message: "This command is on the unconditional blocklist and cannot be approved."

gateway:
  # Messenger replies to slash commands and implicit state changes.
  approval_expired: "⚠️ Approval expired (agent is no longer waiting). Ask the agent to try again."
  draining:         "⏳ Draining {count} active agent(s) before restart..."
  goal_cleared:     "✓ Goal cleared."
  no_active_goal:   "No active goal."
  config_read_failed: "⚠️ Could not read config.yaml: {error}"
  config_save_failed: "⚠️ Could not save config: {error}"

status:
  # Lifecycle status messages emitted by AIAgent during connection/retry/fallback.
  no_response_streaming: "⚠️ No response from provider for {elapsed}s (model: {model}, context: ~{context} tokens). Reconnecting..."
  no_response_nonstreaming: "⚠️ No response from provider for {elapsed}s (non-streaming, model: {model}). Aborting call."
  connection_dropped_toolcall: "⚠️ Connection dropped mid tool-call ({error}). Reconnecting… (attempt {attempt}/{total})"
  connection_dropped: "⚠️ Connection to provider dropped ({error}). Reconnecting… (attempt {attempt}/{total})"
  reconnected: "🔄 Reconnected — resuming…"
  connection_failed: "❌ Connection to provider failed after {attempts} attempts. The provider may be experiencing issues — try again in a moment."
  switching_fallback: "🔄 Primary model failed — switching to fallback: {model} via {provider}"
  stale_connections_cleaned: "🔌 Detected stale connections from a previous provider issue — cleaned up automatically. Proceeding with fresh connection."
  preflight_compression: "📦 Preflight compression: ~{tokens} tokens >= {threshold} threshold. This may take a moment."
  context_reduced: "🗜️ Context reduced to {new} tokens (was {old}), retrying..."
  rate_limited_fallback: "⚠️ Rate limited — switching to fallback provider..."
  empty_response_fallback: "⚠️ Empty/malformed response — switching to fallback..."
  max_retries_fallback: "⚠️ Max retries ({retries}) for invalid responses — trying fallback..."
  max_retries_failed: "❌ Max retries ({retries}) exceeded for invalid responses. Giving up."
  payload_too_large: "⚠️  Request payload too large (413) — compression attempt {current}/{max}..."
  context_too_large: "🗜️ Context too large (~{tokens} tokens) — compressing ({current}/{max})..."
  compressed_retrying: "🗜️ Compressed {old} → {new} messages, retrying..."
  non_retryable_error_fallback: "⚠️ Non-retryable error (HTTP {status}) — trying fallback..."
  non_retryable_error: "❌ Non-retryable error (HTTP {status}): {detail}"
  max_retries_exhausted_fallback: "⚠️ Max retries ({retries}) exhausted — trying fallback..."
  rate_limited_final: "❌ Rate limited after {retries} retries — {detail}"
  api_failed_final: "❌ API failed after {retries} retries — {detail}"
  rate_limited_waiting: "⏱️ Rate limited. Waiting {wait}s (attempt {attempt}/{max})..."
  retrying: "⏳ Retrying in {wait}s (attempt {attempt}/{max})..."
  guardrail_halted: "⚠️ Tool guardrail halted {tool}: {code}"
  stream_interrupted_using_content: "↻ Stream interrupted — using delivered content as final response"
  empty_after_tools_using_prior: "↻ Empty response after tool calls — using earlier content as final answer"
  empty_after_tools_nudging: "⚠️ Model returned empty after tool calls — nudging to continue"
  thinking_only_prefilling: "↻ Thinking-only response — prefilling to continue ({current}/2)"
  empty_response_retrying: "⚠️ Empty response from model — retrying ({current}/3)"
  empty_response_switching_fallback: "⚠️ Model returning empty responses — switching to fallback provider..."
  switched_to_fallback: "↻ Switched to fallback: {model} ({provider})"
