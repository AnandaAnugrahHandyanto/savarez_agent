name: episodic
version: 0.30.0
description: "Episodic Memory — persistent self-hosted memory with SQLite FTS5, session journal, entity tracking, loud failure alerting, and optional skill-candidate review workflows."
author: "Kronos / Jefe"
provides_tools:
  - memory_search
  - memory_get_entity
  - memory_get_episode
  - memory_grep
  - memory_expand
  - memory_describe
  - memory_health
  - memory_stats
  - memory_stale_facts
  - memory_contradictions
  - memory_relationships
  - memory_list_skill_candidates
  - memory_get_skill_candidate
  - memory_update_skill_candidate
  - memory_draft_skill_candidate
  - memory_prepare_skill_candidate_for_creation
  - memory_promote_skill_candidate
hooks:
  - on_turn_start
  - on_session_end
  - on_pre_compress
  - on_memory_write
  - on_delegation
