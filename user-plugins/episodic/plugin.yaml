name: episodic
version: 0.20.0
description: "Episodic Memory — persistent self-hosted memory with SQLite FTS5, session journal, entity tracking, and loud failure alerting."
author: "Kronos / Jefe"
provides_tools:
  - memory_search
  - memory_get_entity
  - memory_get_episode
  - memory_grep
  - memory_expand
  - memory_describe
  - memory_health
  - memory_stats
  - memory_stale_facts
  - memory_contradictions
  - memory_relationships
hooks:
  - on_turn_start
  - on_session_end
  - on_pre_compress
  - on_memory_write
  - on_delegation
