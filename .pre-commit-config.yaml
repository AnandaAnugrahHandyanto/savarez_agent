# Mesh leak-guard (ADR-059): block commits that contain secrets.
# gitleaks 8.30 is installed system-wide; this is a local hook (no network fetch).
# Activate per clone: pre-commit install
repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks (staged secret scan)
        entry: gitleaks git --staged --redact --no-banner
        language: system
        pass_filenames: false
        stages: [pre-commit]
