name: fusion
description: |
  FusionPipeline - Level 14 Compression + BM25 Indexed Search.
  
  A context engine combining:
  - Level 14 aggressive compression (fires at 95% context utilization)
  - BM25 full-text search via SQLite FTS5

  Compression settings:
  - threshold_percent: 0.95 (vs default 0.50)
  - protect_last_n: 30 messages (vs default 20)
  - summary_target_ratio: 0.15

  BM25 search supports FTS5 query syntax (keywords, phrases, boolean, prefix).
version: "1.0.0"
context_engine: fusion

config:
  threshold_percent:
    type: float
    default: 0.95
    description: When to fire compression (0.95 = 95% of context length)
  
  protect_last_n:
    type: int
    default: 30
    description: Number of recent messages to protect from summarization

  summary_target_ratio:
    type: float
    default: 0.15
    description: Portion of compressed content allocated for summary
