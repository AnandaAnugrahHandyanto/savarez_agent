name: gitlab-review
version: 2.0.0
description: "GitLab Merge Request code review tools — view MRs, buffer comments, submit reviews atomically, check pipelines. Supports self-hosted GitLab via GITLAB_URL env var."
author: Hermes Agent
requires_env:
  - GITLAB_TOKEN
provides_tools:
  - gitlab_mr_view
  - gitlab_mr_review_start
  - gitlab_mr_comment
  - gitlab_mr_review_submit
  - gitlab_mr_list
  - gitlab_mr_pipelines
  - gitlab_mr_discussions
