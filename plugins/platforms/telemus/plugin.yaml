name: telemus-platform
label: Telemus
kind: platform
version: 0.1.0
description: >
  Telemus / VR AI Chat gateway adapter for Hermes Agent. Connects to the
  Telemus headless desktop devtools JSONL socket and relays messages between
  Telemus agent transcripts and Hermes sessions.
author: Hermes Agent + Telemus
optional_env:
  - name: TELEMUS_DEVTOOLS_HOST
    description: "Telemus devtools host (default: 127.0.0.1)"
    prompt: "Telemus devtools host"
    password: false
  - name: TELEMUS_DEVTOOLS_PORT
    description: "Telemus devtools JSONL port (default: 8765)"
    prompt: "Telemus devtools port"
    password: false
  - name: TELEMUS_AGENT_INDEX
    description: "Default Telemus agent index for send/poll (default: -1 / selected agent)"
    prompt: "Default agent index"
    password: false
  - name: TELEMUS_HOME_CHANNEL
    description: "Cron/send-message home target, e.g. agent:-1 or agent:0"
    prompt: "Telemus home channel"
    password: false
  - name: TELEMUS_POLL_INTERVAL_SECONDS
    description: "Transcript polling interval in seconds (default: 1.0)"
    prompt: "Poll interval seconds"
    password: false
  - name: TELEMUS_INBOUND_SPEAKERS
    description: "Comma-separated transcript speaker names treated as inbound user messages"
    prompt: "Inbound speakers"
    password: false
