name: line-platform
kind: platform
version: 0.1.0
description: >
  LINE Messaging API gateway adapter for Hermes Agent. Receives LINE webhook
  events from DMs, groups, and rooms, relays text, inbound image, and inbound
  voice/audio messages to the Hermes agent, sends text and LINE rich/Flex/template
  replies via reply or push API, and records unauthorized contacts to a
  profile-local pending approval queue. Rich reminders can use LINE_RICH JSON
  payloads for binary card UX; optional care metadata renders clean Flex bubbles
  with native LINE postback buttons logged to profile-local SQLite/JSONL state.
author: Nous Research
requires_env:
  - LINE_CHANNEL_SECRET
  - LINE_CHANNEL_ACCESS_TOKEN
