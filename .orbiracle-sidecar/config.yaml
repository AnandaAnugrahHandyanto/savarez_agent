model:
  provider: "custom"
  default: "gpt-5.4"
  base_url: "https://api.layofflabs.com/v1"
  context_length: 1000000

toolsets:
  - hermes-cli

platform_toolsets:
  cli: [hermes-cli]
  slack: [hermes-slack]

terminal:
  backend: "local"
  cwd: "/home/orbibot/.zeroclaw"
  timeout: 180

display:
  compact: true
  personality: "helpful"
  streaming: false
  show_reasoning: false
  interim_assistant_messages: false

skills:
  external_dirs: []

agent:
  verbose: false
  reasoning_effort: "medium"

approvals:
  mode: "off"
  timeout: 60

security:
  tirith_enabled: false

command_allowlist:
  - "*"

mcp_servers:
  orbi:
    command: "/usr/bin/node"
    args:
      - "/home/orbibot/.local/share/orbi-viewer-mcp/dist/index.js"
    timeout: 30
    connect_timeout: 30
