# ValidatingAdmissionPolicy that constrains the shape of session pods the
# agent may create. Without this, an agent SA with pods/create is effectively
# namespace-admin (it could schedule a privileged pod with an arbitrary SA
# token mounted). The policy locks session pods to a hardened shape:
#
#   - not the default ServiceAccount
#   - no hostNetwork / hostPID / hostIPC
#   - allowPrivilegeEscalation: false on every container
#   - drop ALL capabilities on every container
#   - no hostPath volumes
#
# Scoping (matchConditions): the policy only governs pod CREATE requests
# made by a ServiceAccount (i.e. by an agent, not by a human) that carry
# the label app.kubernetes.io/managed-by=hermes-agent. The backend stamps
# this label on every session pod.
#
# Requires Kubernetes >= 1.30 (ValidatingAdmissionPolicy GA).
#
# Apply cluster-wide. Test it works:
#   kubectl auth can-i create pods --as=system:serviceaccount:<ns>:<agent-sa> -n <ns>   # yes
#   kubectl --as=system:serviceaccount:<ns>:<agent-sa> create -f compliant-pod.yaml     # allowed
#   kubectl --as=system:serviceaccount:<ns>:<agent-sa> create -f privileged-pod.yaml    # denied

---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: hermes-session-pod-security
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
  matchConditions:
    - name: created-by-serviceaccount
      expression: "request.userInfo.username.startsWith('system:serviceaccount:')"
    - name: is-hermes-session-pod
      expression: >-
        has(object.metadata.labels) &&
        'app.kubernetes.io/managed-by' in object.metadata.labels &&
        object.metadata.labels['app.kubernetes.io/managed-by'] == 'hermes-agent'
  validations:
    - expression: "object.spec.serviceAccountName != 'default'"
      message: "session pods must not run as the default ServiceAccount"
    - expression: "!has(object.spec.hostNetwork) || object.spec.hostNetwork == false"
      message: "hostNetwork is not allowed for session pods"
    - expression: "!has(object.spec.hostPID) || object.spec.hostPID == false"
      message: "hostPID is not allowed for session pods"
    - expression: "!has(object.spec.hostIPC) || object.spec.hostIPC == false"
      message: "hostIPC is not allowed for session pods"
    - expression: >-
        object.spec.containers.all(c,
          has(c.securityContext) &&
          has(c.securityContext.allowPrivilegeEscalation) &&
          c.securityContext.allowPrivilegeEscalation == false)
      message: "every container must set allowPrivilegeEscalation=false"
    - expression: >-
        object.spec.containers.all(c,
          has(c.securityContext) &&
          has(c.securityContext.capabilities) &&
          has(c.securityContext.capabilities.drop) &&
          c.securityContext.capabilities.drop.exists(d, d == 'ALL'))
      message: "every container must drop ALL capabilities"
    - expression: >-
        !has(object.spec.volumes) ||
        object.spec.volumes.all(v, !has(v.hostPath))
      message: "hostPath volumes are not allowed for session pods"

---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: hermes-session-pod-security
spec:
  policyName: hermes-session-pod-security
  validationActions: ["Deny"]
  # Cluster-wide; the matchConditions above scope enforcement to hermes
  # session pods created by ServiceAccounts. Tighten with a
  # namespaceSelector if you want to restrict to specific namespaces.
  matchResources: {}
