defaults:
  enabled: false
  posture: local_read_only_default_off_supervised
  deny_by_default: true
  reportable_output_default: metadata_only
  cache_key_requirements:
    - registry_version
    - grant_version
    - source_family
    - subject
    - include_or_scope
  standard_redactions:
    - token_shaped_values
    - credential_refs
    - raw_platform_ids_for_cross_agent_or_reportable_output
    - private_absolute_paths_for_reportable_output
    - transcript_like_lines_for_reportable_output

source_families:
  wiki_gbrain:
    owner: librarian
    backend: gbrain_via_atlas_query_wiki
    allowed_scopes: [wiki]
    allowed_includes: []
    private_class: atlas_private
    canonicality: curated_wiki_when_active
    freshness_rule:
      dogfood_stale_after_seconds: 604800
      loop3_reference_seconds: 2592000
      surface_staleness_warning: true
    redaction_profile: standard_reportable_redaction
    fallback_labels: [gbrain_missing, gbrain_timeout, gbrain_error, stale_index, partial_corpus, client_side_filter, source_filter_client_side]
    public_artifact_policy: sanitized_metadata_and_bounded_snippets_only_unless_separately_published
    rollback_semantics:
      disable_label: source_family_disabled
      cache_namespace: wiki_gbrain
      on_disable: clear_family_cache_and_deny_grants
    allowed_posture: sax_supervised_pull_only_after_review

  diary_gbrain:
    owner: agent_diary_owner_with_librarian_curation
    backend: gbrain_via_atlas_query_memory
    allowed_scopes: [diary]
    allowed_includes: []
    private_class: agent_private
    canonicality: agent_diary_operational_memory_not_public_artifact
    freshness_rule:
      dogfood_stale_after_seconds: 86400
      low_risk_recall_stale_after_seconds: 604800
      surface_staleness_warning: true
    redaction_profile: standard_plus_cross_agent_diary_redaction
    fallback_labels: [gbrain_missing, gbrain_timeout, gbrain_error, stale_index, partial_corpus, client_side_filter, source_filter_client_side]
    public_artifact_policy: no_public_raw_snippets_unless_librarian_curates_into_wiki
    rollback_semantics:
      disable_label: source_family_disabled
      cache_namespace: diary_gbrain
      on_disable: clear_family_cache_revoke_subject_diary_grants
    allowed_posture: sax_self_supervised_pull_only_after_review

  context_descriptor_files:
    owner: descriptor_source_owner
    backend: exact_filesystem_descriptors
    allowed_scopes: [context]
    allowed_includes: [user, memory, soul, project, last_session]
    private_class: agent_private_or_atlas_private_per_descriptor
    canonicality: runtime_context_or_project_context_per_descriptor
    freshness_rule:
      default_stale_after_seconds: 604800
      source: descriptor_freshness_ts_or_filesystem_mtime
      surface_freshness_label: true
    redaction_profile: standard_plus_context_sensitive_vocabulary_line_redaction
    fallback_labels: [context_unavailable, source_not_registered, protected_path_denied, source_too_large, stale_context_source, unauthorized_narrowing]
    public_artifact_policy: descriptor_inventory_may_be_reportable_without_absolute_roots_snippets_require_hygiene_scan
    rollback_semantics:
      disable_label: source_not_registered
      cache_namespace: context_descriptor_files
      on_disable: clear_descriptor_cache_no_path_substitution
    allowed_posture: sax_supervised_exact_descriptor_pull_only_after_review

  hermes_session_search:
    owner: hermes_runtime_user
    backend: hermes_sqlite_fts5_session_db
    allowed_scopes: [session]
    allowed_includes: []
    private_class: raw_transcript_private
    canonicality: raw_session_transcript_history
    freshness_rule:
      source: session_db_timestamps
      required_before_use: add_age_labels_per_session_or_message
    redaction_profile: transcript_safe_redaction_required_before_reportable_output
    fallback_labels: [session_db_unavailable, source_family_disabled]
    public_artifact_policy: metadata_only_no_public_transcript_snippets
    rollback_semantics:
      disable_label: source_family_disabled
      cache_namespace: hermes_session_search
      on_disable: clear_session_window_cache_and_deny_all_session_grants
    allowed_posture: held_not_initial_dogfood

  bus_operational_metadata:
    owner: system_pipes
    backend: bus_jsonl_and_sqlite_mirror
    allowed_scopes: [ops]
    allowed_includes: []
    private_class: ops_private
    canonicality: authoritative_operational_event_metadata
    freshness_rule:
      recent_window_seconds: 600
      broader_summary_max_seconds: 86400
      surface_stale_mirror: true
    redaction_profile: ops_metadata_redaction_no_raw_ids_or_private_paths
    fallback_labels: [bus_sqlite_missing, bus_jsonl_missing, stale_mirror, partial_archive]
    public_artifact_policy: metadata_only_no_raw_payloads_or_platform_ids
    rollback_semantics:
      disable_label: source_family_disabled
      cache_namespace: bus_operational_metadata
      on_disable: clear_bus_query_cache_and_deny_ops_grants
    allowed_posture: held_for_registry_review

  qmd_regression:
    owner: system_pipes_memory_benchmark
    backend: qmd_index_and_benchmark_outputs
    allowed_scopes: []
    allowed_includes: []
    private_class: atlas_private
    canonicality: regression_evidence_not_primary_recall
    freshness_rule:
      source: benchmark_timestamp_only
    redaction_profile: inherits_source_under_test
    fallback_labels: [qmd_fallback_not_primary, qmd_missing, qmd_stale]
    public_artifact_policy: benchmark_summary_only
    rollback_semantics:
      disable_label: omitted_from_runtime_registry
      cache_namespace: none
      on_disable: keep_out_of_runtime
    allowed_posture: eval_only

  librarian_custody_outputs:
    owner: librarian
    backend: curated_wiki_outputs_only
    allowed_scopes: [wiki]
    allowed_includes: []
    private_class: atlas_private_until_published
    canonicality: canonical_after_librarian_acceptance
    freshness_rule:
      inherits: wiki_gbrain
    redaction_profile: inherits_curated_source_policy
    fallback_labels: [write_like_unavailable, write_like_forbidden]
    public_artifact_policy: public_only_by_librarian_publish_policy
    rollback_semantics:
      disable_label: no_seam_write_grants_exist
      cache_namespace: wiki_gbrain
      on_disable: no_write_revoke_needed_because_seam_has_no_writes
    allowed_posture: read_only_via_wiki_after_review

grant_matrix:
  sax:
    wiki_gbrain:
      decision: allow_after_review
      modes: [supervised, pull_only]
      denied_modes: [startup, turn, cron, runtime, write_request]
    diary_gbrain:
      decision: allow_own_diary_after_descriptor_and_grant_review
      modes: [supervised, pull_only]
      constraints: [subject_must_equal_sax, no_all_agent_widening]
      denied_modes: [startup, turn, cron, runtime, write_request]
    context_descriptor_files:
      decision: allow_after_review
      modes: [supervised, pull_only]
      includes: [soul, memory, project, last_session]
      constraints: [exact_descriptors_only, no_profile_crawling]
      denied_modes: [startup, turn, cron, runtime, write_request]
    hermes_session_search:
      decision: hold
      modes: []
      future_candidate: supervised_metadata_first_only
    bus_operational_metadata:
      decision: hold
      modes: []
    qmd_regression:
      decision: eval_only
      modes: [supervised]
    write_request:
      decision: deny
      modes: []

  watson:
    all_source_families:
      decision: hold_broad_adoption
      note: existing_non_seam_tools_unchanged
      modes: []
    write_request:
      decision: deny_via_seam

  librarian:
    all_source_families:
      decision: hold_broad_adoption_through_seam
      note: custody_authority_remains_outside_memory_seam
      modes: []
    qmd_regression:
      decision: eval_only
      modes: [supervised]
    write_request:
      decision: deny_via_seam_librarian_writes_only_through_reviewed_custody_tools

  terminal:
    all_source_families:
      decision: hold
      modes: []
    qmd_regression:
      decision: eval_only
      modes: [supervised]
    write_request:
      decision: deny

  builder_and_workers:
    all_source_families:
      decision: deny_until_reviewed
      modes: []
    write_request:
      decision: deny

  cron_unsupervised:
    all_source_families:
      decision: deny_until_hmac_or_scoped_vault_and_negative_tests
      modes: []
    qmd_regression:
      decision: fixture_local_eval_only
      modes: []
    write_request:
      decision: deny

  network_multi_user_multi_machine:
    all_source_families:
      decision: deny_until_hmac_scoped_vault_and_acting_for_model
      modes: []
    write_request:
      decision: deny

evaluator_contract:
  input_tuple: [subject, source_family, scope_or_include, mode, posture, grant_version]
  output_allow_fields: [decision, max_bytes, redaction_profile, cache_namespace, audit_receipt_metadata]
  output_deny_fields: [decision, degraded_label, reason, audit_receipt_metadata]
  enforcement_invariants:
    - deny_before_backend_touch
    - token_subject_can_only_be_narrowed_by_request_shape
    - disabled_source_family_precedes_stale_grant
    - exact_descriptor_match_no_fallback_discovery
    - mode_gates_distinguish_supervised_pull_only_from_startup_turn_cron_runtime
    - redaction_and_truncation_labels_are_machine_visible
    - audit_receipts_metadata_only
    - cache_keys_include_registry_version_and_grant_version
    - seam_has_no_librarian_write_custody_authority
    - reportable_output_requires_separate_hygiene_policy
  required_deny_examples:
    - subject: sax
      source_family: diary_gbrain
      scope_or_include: diary
      mode: cron
      degraded_label: grant_mode_denied
    - subject: builder
      source_family: wiki_gbrain
      scope_or_include: wiki
      mode: supervised
      degraded_label: grant_missing
    - subject: sax
      source_family: context_descriptor_files
      scope_or_include: unknown_include
      mode: supervised
      degraded_label: source_not_registered
    - subject: network_multi_user_multi_machine
      source_family: wiki_gbrain
      scope_or_include: wiki
      mode: runtime
      degraded_label: verifier_required
  evaluator_only_acceptance_cases:
    sax_wiki_supervised_allow:
      input:
        subject: sax
        source_family: wiki_gbrain
        scope_or_include: wiki
        mode: supervised
        posture: local_read_only_default_off_supervised
      expected: allow_metadata_only_bounded_bytes_standard_redaction_wiki_cache_namespace
      proves: reviewed_sax_pull_path_without_backend_calls
    sax_context_project_pull_allow:
      input:
        subject: sax
        source_family: context_descriptor_files
        scope_or_include: project
        mode: pull_only
      expected: allow_metadata_only_exact_descriptor_required_no_path_discovery
      proves: context_access_is_descriptor_key_based
    sax_diary_cron_deny:
      input:
        subject: sax
        source_family: diary_gbrain
        scope_or_include: diary
        mode: cron
      expected_degraded_label: grant_mode_denied
      proves: supervised_pull_only_does_not_widen_to_cron
    builder_wiki_supervised_deny:
      input:
        subject: builder
        source_family: wiki_gbrain
        scope_or_include: wiki
        mode: supervised
      expected_degraded_label: grant_missing
      proves: worker_adoption_stays_denied_until_review
    sax_unknown_context_include_deny:
      input:
        subject: sax
        source_family: context_descriptor_files
        scope_or_include: unknown_include
        mode: supervised
      expected_degraded_label: source_not_registered
      proves: include_allowlist_is_closed
    network_runtime_verifier_deny:
      input:
        subject: network_multi_user_multi_machine
        source_family: wiki_gbrain
        scope_or_include: wiki
        mode: runtime
      expected_degraded_label: verifier_required
      proves: hmac_or_scoped_vault_requirement_is_hard_gate
    source_family_kill_switch_deny:
      setup: wiki_gbrain_enabled_false_with_valid_sax_grant
      expected_degraded_label: source_family_disabled
      cache_action: clear_wiki_gbrain_family_cache_namespace
      proves: source_family_disable_beats_stale_grants
    grant_revocation_deny:
      setup: sax_context_grant_revoked_or_grant_version_incremented
      expected_degraded_label: grant_revoked
      cache_action: clear_subject_family_descriptor_cache_keys
      proves: revocation_invalidates_cached_authority
    public_artifact_lock_deny:
      setup: reportable_snippet_requested_while_public_artifact_lock_active
      expected_degraded_label: public_artifact_locked
      expected_output: metadata_receipt_only
      proves: local_safe_read_is_not_automatically_public_safe

useful_content_eval:
  goal: prove_safe_useful_content_survives_redaction_and_truncation_vs_disabled_baseline
  fixture_families: [wiki_gbrain, diary_gbrain, context_descriptor_files, project_context, hermes_session_like]
  baselines: [disabled_no_seam, leak_prevention_only, useful_safe_target]
  fixture_cases:
    wiki_curated_project_fact:
      source_family: wiki_gbrain
      useful_fact: project_owner_gate_posture_and_next_action
      embedded_hazards: [token_shaped_value, private_absolute_path, stale_marker]
      required_safe_output: bounded_snippet_with_source_label_useful_fact_redaction_labels_and_staleness_warning_when_aged
      disabled_comparison: disabled_baseline_cannot_answer_owner_posture_next_action
      dogfood_gate: allowed_family_must_pass
    diary_self_operational_fact:
      source_family: diary_gbrain
      useful_fact: sax_local_assumption_or_handoff_note
      embedded_hazards: [cross_agent_diary_phrase, raw_platform_style_id, credential_ref]
      required_safe_output: self_supervised_fact_survives_reportable_mode_removes_id_and_ref
      disabled_comparison: disabled_baseline_loses_handoff_fact
      dogfood_gate: optional_until_diary_review
    context_descriptor_project_note:
      source_family: context_descriptor_files
      useful_fact: exact_descriptor_title_root_ref_relative_path_project_fact
      embedded_hazards: [protected_path_decoy, private_path_text, oversized_tail]
      required_safe_output: descriptor_metadata_without_absolute_root_front_loaded_fact_survives_byte_cap_no_path_substitution
      disabled_comparison: disabled_baseline_lacks_project_context
      dogfood_gate: allowed_family_must_pass
    session_like_hazard_window:
      source_family: hermes_session_search
      useful_fact: generic_user_decision_phrase
      embedded_hazards: [raw_transcript_vocabulary, tool_call_text, platform_id, private_path]
      required_safe_output: metadata_only_or_heavily_redacted_content
      disabled_comparison: disabled_baseline_equal_or_safer_if_usefulness_cannot_be_preserved
      dogfood_gate: held_synthetic_only
    ops_event_metadata:
      source_family: bus_operational_metadata
      useful_fact: event_type_coarse_time_bucket_and_outcome
      embedded_hazards: [raw_delivery_id, raw_payload_summary, private_path]
      required_safe_output: metadata_summary_only_no_raw_ids_or_payloads_ops_private_label
      disabled_comparison: disabled_baseline_cannot_answer_did_event_happen
      dogfood_gate: held_synthetic_only
  required_assertions:
    - task_relevant_fact_survives
    - source_label_present
    - redaction_labels_accurate
    - no_token_shaped_values
    - no_credential_refs
    - no_raw_platform_ids_in_cross_agent_or_reportable_mode
    - no_private_absolute_paths_in_reportable_mode
    - truncation_preserves_front_loaded_useful_fact_and_sets_label
  closure_metrics: [useful_fact_recall_by_family, bytes_before_after, redaction_labels, token_estimate, latency_envelope, residual_hazard_notes]

public_hygiene_scan:
  purpose: prevent_local_safe_reads_from_being_mistaken_for_public_reportable_artifacts
  scope: fixture_and_sample_outputs_before_closure_candidate_packets_include_snippets
  minimum_pass_condition: zero_forbidden_values_while_preserving_metadata_labels_byte_counts_versions_and_coarse_latency
  forbidden_families:
    token_shaped_values:
      deny_patterns: [api_key_like_strings, bearer_tokens, long_opaque_secrets]
      required_behavior: redact_value_preserve_label_and_byte_counts_only
      applies_to: all_reportable_outputs
    credential_refs:
      deny_patterns: [env_paths, auth_paths, keychain_refs, oauth_refs, credential_file_refs, key_usage_instructions]
      required_behavior: remove_line_or_replace_with_metadata_label
      applies_to: all_outputs_local_self_read_also_redacts_secrets
    raw_platform_ids:
      deny_patterns: [discord_ids, slack_ids, telegram_ids, thread_ids, message_ids, user_ids, snowflake_like_ids]
      required_behavior: remove_or_coarsen_unless_explicitly_metadata_safe_and_non_reportable
      applies_to: cross_agent_and_reportable_outputs
    private_absolute_paths:
      deny_patterns: [home_absolute_paths, private_profile_paths, session_log_cache_paths]
      required_behavior: replace_with_root_ref_or_relative_descriptor_metadata
      applies_to: reportable_outputs
    raw_transcript_snippets:
      deny_patterns: [direct_chat_turns, tool_call_json, gateway_log_lines, session_windows]
      required_behavior: metadata_only_unless_dedicated_transcript_safe_adapter_exists
      applies_to: session_like_sources_and_closure_artifacts
    custody_boundary_confusion:
      deny_patterns: [seam_write_authority, seam_curates_memory, seam_publishes, seam_reindexes, seam_retires_threads]
      required_behavior: fail_scan_and_rewrite_artifact_text
      applies_to: docs_audit_receipts_review_packets
  if_useful_content_cannot_survive: keep_source_family_held_or_metadata_only

kill_switches:
  global_seam_reads:
    effect: all_context_and_recall_return_empty_degraded
    degraded_label: seam_disabled
    health: coarse_disabled_state_only
    cache_action: clear_all_seam_caches
  source_family:
    effect: deny_one_family_only
    degraded_label: source_family_disabled
    cache_action: clear_family_cache_namespace
  agent_profile_grant:
    effect: deny_subject_family_or_mode
    degraded_label: grant_revoked
    cache_action: clear_subject_family_descriptor_materializations
  descriptor_row:
    effect: disable_exact_descriptor_without_substitution
    degraded_label: source_not_registered
    cache_action: clear_descriptor_cache
  public_artifact_lock:
    effect: disable_reportable_snippets_globally
    degraded_label: public_artifact_locked
    cache_action: clear_reportable_output_cache

review_defaults:
  registry_home: upstream_reviewed_contract_to_system_pipes_gate_docs_before_runtime_use
  held_source_rows: keep_session_and_bus_as_held_accounting_rows_but_omit_from_first_allow_path
  first_dogfood_rung: sax_supervised_pull_only_wiki_and_context_exact_descriptors
