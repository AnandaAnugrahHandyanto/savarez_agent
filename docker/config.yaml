# Hermes Agent — Docker deployment config
# This file is copied to $HERMES_HOME/config.yaml on first container start.
# It enables the OpenAI-compatible API server, the A2A toolset, and pre-wires
# all 30 agents so they can call each other over the internal Docker network.

# =============================================================================
# Model — set via env var in docker-compose, not hardcoded here
# =============================================================================
model:
  default: "MiniMax-M2.7"
  provider: minimax

# =============================================================================
# Platform toolsets
# api_server — OpenAI-compatible HTTP API on :8642
# =============================================================================
platform_toolsets:
  api_server: [hermes-core, a2a, web, file]
  cli:        [hermes-cli]

# =============================================================================
# A2A — cross-agent registry
# All 30 agents are pre-wired. Each agent can call the others by name.
# Bearer tokens are injected at runtime via AGENT_BEARER_* env vars.
# Within the Docker network agents reach each other by service name on :9000.
# =============================================================================
a2a_agents:
  # ── Harry Potter ────────────────────────────────────────────────────────
  harry:
    url: "http://harry:9000"
    description: "Harry Potter — The Boy Who Lived. Brave, determined, loyal."
    bearer_token: "${HARRY_A2A_KEY}"

  hermione:
    url: "http://hermione:9000"
    description: "Hermione Granger — Brightest witch of her age. Research and analysis expert."
    bearer_token: "${HERMIONE_A2A_KEY}"

  ron:
    url: "http://ron:9000"
    description: "Ron Weasley — Loyal friend, chess strategist, heart of the trio."
    bearer_token: "${RON_A2A_KEY}"

