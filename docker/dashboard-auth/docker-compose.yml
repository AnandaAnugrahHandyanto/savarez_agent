services:
  hermes-none:
    build:
      context: ../..
      dockerfile: docker/dashboard-auth/Dockerfile
    command: hermes dashboard --host 0.0.0.0 --port 9119 --no-open --auth none --insecure
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9119/api/auth/status"]
      interval: 2s
      timeout: 2s
      retries: 30

  hermes-token:
    build:
      context: ../..
      dockerfile: docker/dashboard-auth/Dockerfile
    command: hermes dashboard --host 0.0.0.0 --port 9119 --no-open --auth token --auth-token docker-token
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9119/api/auth/status"]
      interval: 2s
      timeout: 2s
      retries: 30

  hermes-password:
    build:
      context: ../..
      dockerfile: docker/dashboard-auth/Dockerfile
    command: hermes dashboard --host 0.0.0.0 --port 9119 --no-open --auth password --auth-password docker-password
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9119/api/auth/status"]
      interval: 2s
      timeout: 2s
      retries: 30

  hermes-trusted-proxy:
    build:
      context: ../..
      dockerfile: docker/dashboard-auth/Dockerfile
    command: hermes dashboard --host 0.0.0.0 --port 9119 --no-open --auth trusted-proxy --trusted-proxy-user-header X-Forwarded-User
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9119/api/auth/status"]
      interval: 2s
      timeout: 2s
      retries: 30

  hermes-tailscale:
    build:
      context: ../..
      dockerfile: docker/dashboard-auth/Dockerfile
    command: hermes dashboard --host 0.0.0.0 --port 9119 --no-open --auth tailscale --tailscale-user-header Tailscale-User-Login
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9119/api/auth/status"]
      interval: 2s
      timeout: 2s
      retries: 30

  trusted-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx-trusted-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      hermes-trusted-proxy:
        condition: service_healthy

  tailscale-mock:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx-tailscale-mock.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      hermes-tailscale:
        condition: service_healthy

  test-runner:
    build:
      context: ../..
      dockerfile: docker/dashboard-auth/Dockerfile
    command: python docker/dashboard-auth/smoke.py
    depends_on:
      hermes-none:
        condition: service_healthy
      hermes-token:
        condition: service_healthy
      hermes-password:
        condition: service_healthy
      trusted-proxy:
        condition: service_started
      tailscale-mock:
        condition: service_started
