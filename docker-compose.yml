# Hermes Agent Fleet — 30 character containers
#
# PORT SCHEME (per container):
#   Hermes gateway (OpenAI-compatible API):  80xx
#   A2A server:                              90xx
#   Filebrowser UI:                          70xx
#
# GROUPS:
#   Harry Potter  — 8001-8010 / 9001-9010 / 7001-7010
#   Marvel        — 8011-8020 / 9011-9020 / 7011-7020
#   Office        — 8021-8030 / 9021-9030 / 7021-7030
#
# RESOURCE LIMITS:
#   Memory: 768MB per container  (30 × 0.75GB = 22.5GB)
#   CPU:    0.25 cores           (30 × 0.25   =  7.5 cores)
#
# SETUP:
#   1. Copy .env.fleet.example to .env.fleet and fill in all keys
#   2. docker compose --env-file .env.fleet up -d
#   3. Each container's data persists in ./data/<name>/
#
# A2A AUTHENTICATION:
#   Every container requires A2A_KEY set — the A2A server will start but
#   log a warning if unset. Calls between agents include bearer tokens
#   configured in docker/config.yaml via ${NAME_A2A_KEY} substitution.

x-hermes-base: &hermes-base
  image: hermes-agent:latest
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - agents
  deploy:
    resources:
      limits:
        memory: 768M
        cpus: "0.25"

networks:
  agents:
    driver: bridge

# =============================================================================
# HARRY POTTER GROUP
# =============================================================================
services:

  harry:
    <<: *hermes-base
    container_name: hermes-harry
    ports:
      - "8001:8642"   # Hermes API
      - "9001:9000"   # A2A
      - "7001:8080"   # Filebrowser
    environment:
      AGENT_PERSONA: harry
      AGENT_NAME: "Harry Potter"
      AGENT_DESCRIPTION: "The Boy Who Lived. Brave, loyal, and direct."
      AGENT_SKILLS: "problem-solving,leadership,defence"
      A2A_KEY: "${HARRY_A2A_KEY}"
      FB_PASSWORD: "${HARRY_FB_PASSWORD}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    volumes:
