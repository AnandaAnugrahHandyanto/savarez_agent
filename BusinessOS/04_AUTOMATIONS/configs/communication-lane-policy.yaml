version: 1
updated_for: steady-businessos
principles:
  - Keep customer-facing intake separate from owner/operator control traffic.
  - Ingest all helixsystems.cc mailbox aliases, then route by alias queue and reaction mode.
  - Never auto-send legal, privacy, or billing replies without owner approval.
  - Keep owner/operator Telegram traffic out of support feedback and customer-reply queues.

defaults:
  inbound_ingest: true
  preserve_raw_artifacts: true
  preserve_normalized_artifacts: true
  preserve_task_transcripts: true

email_alias_policies:
  admin@helixsystems.cc:
    queue: admin
    mailbox_role: admin
    reaction_mode: log-only
    actions:
      - ingest
      - categorize
      - log
      - file_attachments_when_business_relevant
  support@helixsystems.cc:
    queue: customer-support
    mailbox_role: customer-support
    reaction_mode: draft-only
    actions:
      - ingest
      - categorize
      - suggested_response
      - mark_needs_reply
      - file_attachments_when_business_relevant
  billing@helixsystems.cc:
    queue: billing-support
    mailbox_role: billing-support
    reaction_mode: owner-approval-required
    actions:
      - ingest
      - categorize
      - suggested_response
      - mark_high_priority
      - require_owner_approval_before_send
  hello@helixsystems.cc:
    queue: community-support
    mailbox_role: community-support
    reaction_mode: draft-only
    actions:
      - ingest
      - categorize
      - suggested_response
      - mark_needs_reply
  legal@helixsystems.cc:
    queue: legal-review
    mailbox_role: legal-review
    reaction_mode: owner-approval-required
    actions:
      - ingest
      - categorize
      - hold_for_owner_review
      - never_auto_send
  privacy@helixsystems.cc:
    queue: privacy-review
    mailbox_role: privacy-review
    reaction_mode: owner-approval-required
    actions:
      - ingest
      - categorize
      - hold_for_owner_review
      - never_auto_send
  expenses@helixsystems.cc:
    queue: finance-review
    mailbox_role: expense-intake
    reaction_mode: log-only
    actions:
      - ingest
      - classify_as_business_expense_record_when_applicable
      - extract_amount_vendor_and_date
      - file_business_expense_documents
      - populate_tax_treatment_records
      - never_auto_send

telegram_lane_policies:
  telegram-steady-support:
    lane: customer-support
    reaction_mode: draft-only
    actions:
      - ingest
      - categorize
      - suggested_response
      - mark_needs_reply
      - keep_operator_self_tests_separate
  telegram-businessos-operator:
    lane: operator-control
    reaction_mode: internal-ops
    actions:
      - ingest
      - classify_as_internal_ops
      - parse_task_commands
      - store_reminders_in_tasks
      - never_create_customer_feedback_items
      - never_mark_customer_needs_reply
      - never_send_customer_reply

outbound_policy:
  customer_support_email: draft-only
  community_support_email: draft-only
  billing_email: owner-approval-required
  legal_email: owner-approval-required
  privacy_email: owner-approval-required
  customer_support_telegram: draft-only
  operator_control_telegram: internal-only

current_capability_notes:
  - BusinessOS currently ingests, routes, categorizes, stores tasks/reminders, and generates suggested responses.
  - Fully automated outbound sending is not yet enabled in the current on-disk stack.
  - Reaction modes are policy-bearing config now; outbound enforcement will be completed when the send/approval pipeline is restored.
