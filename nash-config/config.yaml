# Nash AI — Hermes config
# Deploy to: ~/.hermes/config.yaml on VPS
# Secrets go in: ~/.hermes/.env (see .env.example)

# =============================================================================
# LLM — route through Prism (OpenAI-compatible proxy on localhost)
# =============================================================================
model:
  provider: "custom"
  base_url: "http://localhost:3000/v1"
  default: "claude-opus-4-7"
  # Prism routes claude-opus-4-7 → Anthropic API
  # Falls back to direct Anthropic if Prism unreachable (set ANTHROPIC_API_KEY in .env)

# =============================================================================
# Telegram gateway
# =============================================================================
# Env vars: TELEGRAM_BOT_TOKEN, TELEGRAM_ALLOWED_USERS, TELEGRAM_HOME_CHANNEL

# Stream tokens as Telegram message edits
streaming:
  enabled: true
  edit_interval: 0.3
  buffer_threshold: 40
  cursor: " ▊"

# =============================================================================
# Voice transcription — Groq Whisper (free tier, fast)
# =============================================================================
# Env var: GROQ_API_KEY
stt:
  provider: groq
  # Falls back to local faster-whisper if GROQ_API_KEY not set

# =============================================================================
# Skills
# =============================================================================
skills:
  create_from_experience: true
  directory: ~/.hermes/skills

# =============================================================================
# Platform toolsets
# =============================================================================
platform_toolsets:
  cli: [hermes-cli]
  telegram: [hermes-telegram]

# =============================================================================
# Approval mode — will be upgraded to "tiered" after Phase 2 fork work
# =============================================================================
approval: smart

