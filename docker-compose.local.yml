services:
  hermes-agent-local:
    image: hermes-agent-local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-agent-local
    restart: unless-stopped
    env_file:
      - ../data/.env
    ports:
      - "4861:4861"
      - "8001:8001"
    volumes:
      - D:/hermes-github/data:/opt/data
    environment:
      - HERMES_S6_SUPERVISED_CHILD=1
    command: gateway run
