# Invalid fixture: runtime_tooling repos must declare an explicit gateway_runtime_queue live gate and required live-apply queue.
version: 1

repo:
  name: invalid-runtime-missing-queue
  class: runtime_tooling

authority:
  policy_source: .hermes/repo-policy.yaml

roles:
  work: task_worktree
  landing: verified_fork_main
  release: upstream_sync_or_local_release_note
  live_apply: not_applicable

branches:
  landing: main
  release_base: main

gates:
  green_allowed:
    - code_changes
    - tests
    - local_commit
  yellow_queue:
    - human_review_needed
  red_requires_explicit_approval:
    - push
    - upstream_pr
    - merge
    - gateway_restart_reload
    - live_runtime_apply

runtime:
  restart_policy: not_applicable
  live_apply_queue: not_applicable

closeout:
  required_sections:
    - Policy check
    - Green 완료
    - Yellow 대기
    - Red 필요
    - 검증
    - Git 상태
    - Live 상태
