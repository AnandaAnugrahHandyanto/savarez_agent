# Traefik v2.11 — Static Configuration
# Mirrors the CLI flags previously in docker-compose.yml command: section.
# No functional changes — config moved here for readability.
# Loaded via: --configFile=/traefik.yml (single CLI arg in docker-compose.yml)

api:
  dashboard: true
  insecure: false

providers:
  docker:
    exposedByDefault: false
    network: proxy
    httpClientTimeout: 300

entryPoints:
  web:
    address: ":80"
  metrics:
    address: ":8082"

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    entryPoint: metrics

log:
  level: INFO

accessLog:
  format: json
