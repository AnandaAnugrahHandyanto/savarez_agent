services:
  couchdb:
    image: couchdb:3.3
    container_name: couchdb
    restart: unless-stopped
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    volumes:
      - couchdb_data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://couchdb:5984/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.couchdb.rule=Host(`couchdb.jaxmind.xyz`)"
      - "traefik.http.routers.couchdb.entrypoints=web"
      - "traefik.http.services.couchdb.loadbalancer.server.port=5984"
      - "traefik.http.middlewares.couchdb-cors.headers.accesscontrolallowmethods=GET,PUT,POST,HEAD,DELETE"
      - "traefik.http.middlewares.couchdb-cors.headers.accesscontrolallowheaders=accept,authorization,content-type,origin,referer"
      - "traefik.http.middlewares.couchdb-cors.headers.accesscontrolalloworiginlist=app://obsidian.md,capacitor://localhost,http://localhost"
      - "traefik.http.middlewares.couchdb-cors.headers.accesscontrolmaxage=3600"
      - "traefik.http.middlewares.couchdb-cors.headers.addvaryheader=true"
      - "traefik.http.middlewares.couchdb-cors.headers.accessControlAllowCredentials=true"
      - "traefik.http.routers.couchdb.middlewares=couchdb-cors"

  obsidian-livesync-daemon:
    image: livesync-cli:latest
    container_name: obsidian-livesync-daemon
    profiles: ["manual"]
    restart: "no"
    environment:
      - LIVESYNC_DB_PATH=/vault
    volumes:
      - /lab/obsidian_vault:/vault
      - livesync_config:/vault/.livesync
    entrypoint: ["/bin/sh", "-c"]
    command: ["livesync-cli mirror && livesync-cli sync"]
    depends_on:
      - couchdb
    networks:
      - proxy

volumes:
  couchdb_data:

networks:
  proxy:
    name: proxy
    external: true
