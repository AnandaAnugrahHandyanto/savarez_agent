services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      - HOMEPAGE_VAR_TITLE=jaxmind.xyz
      - HOMEPAGE_ALLOWED_HOSTS=home.jaxmind.xyz
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.jaxmind.xyz`)"
      - "traefik.http.routers.homepage.entrypoints=web"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
      # Basic auth protection
      - "traefik.http.routers.homepage.middlewares=homepage-auth"
      - "traefik.http.middlewares.homepage-auth.basicauth.users=${HOMEPAGE_AUTH}"
      - "traefik.http.middlewares.homepage-auth.basicauth.realm=jaxmind"

networks:
  proxy:
    external: true
