services:
  jax-control-plane:
    build:
      context: /lab/deploy-checkouts/jax-control-plane-main
      dockerfile: Dockerfile
    container_name: jax-control-plane
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
      - /lab:/lab:ro
      - ${HERMES_HOME:-/home/pablo/.hermes}:${HERMES_HOME:-/home/pablo/.hermes}:ro
    networks:
      - proxy
      - jax-control-plane-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8085/health/live', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.jax-control-plane.rule=Host(`${JAX_CONTROL_PLANE_HOST}`)"
      - "traefik.http.routers.jax-control-plane.entrypoints=web"
      - "traefik.http.routers.jax-control-plane.middlewares=jax-control-plane-auth"
      - "traefik.http.middlewares.jax-control-plane-auth.basicauth.users=${JAX_CONTROL_PLANE_AUTH}"
      - "traefik.http.middlewares.jax-control-plane-auth.basicauth.realm=jaxmind"
      - "traefik.http.services.jax-control-plane.loadbalancer.server.port=8085"

networks:
  proxy:
    external: true
  jax-control-plane-internal:
    driver: bridge
