global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: discord

receivers:
  - name: discord
    discord_configs:
      - webhook_url: "https://discord.com/api/webhooks/1492969577582170169/NEpxYVHzmvbhILROvjbMOi7goRurFJrmy_qo4XqmronXDdhUU0UD02E6ofwM6GWNpK0X"
        title: '{{ if eq .Status "firing" }}🔥 ALERT{{ else }}✅ RESOLVED{{ end }}: {{ .GroupLabels.alertname }}'
        message: |
          {{ range .Alerts }}
          **Status:** {{ .Status | toUpper }}
          **Alert:** {{ .Annotations.summary }}
          **Details:** {{ .Annotations.description }}
          **Host:** {{ .Labels.host }}
          **Since:** {{ .StartsAt | since }}
          {{ end }}

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: ["alertname", "host"]
