groups:
  - name: infrastructure
    rules:

      # ── Host availability ──────────────────────────────────────────────────────
      - alert: HostDown
        expr: up == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Host {{ $labels.instance }} is down"
          description: "Scrape target {{ $labels.instance }} (job={{ $labels.job }}) is unreachable."

      # ── CPU ───────────────────────────────────────────────────────────────────
      - alert: HighCPU
        expr: >
          (
            1 - avg by (instance) (
              rate(node_cpu_seconds_total{mode="idle"}[5m])
            )
          ) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage on {{ $labels.instance }} has been above 85% for more than 5 minutes (current: {{ $value | printf \"%.1f\" }}%)."

      # ── Memory ────────────────────────────────────────────────────────────────
      - alert: HighMemory
        expr: >
          node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low memory on {{ $labels.instance }}"
          description: "Available memory on {{ $labels.instance }} has been below 10% for more than 5 minutes (current: {{ $value | printf \"%.1f%%\" }})."

      # ── Disk space (warning) ──────────────────────────────────────────────────
      - alert: DiskFull
        expr: >
          node_filesystem_avail_bytes{fstype!="tmpfs"}
          / node_filesystem_size_bytes{fstype!="tmpfs"} < 0.15
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Disk filling up on {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} has less than 15% free (current: {{ $value | printf \"%.1f%%\" }})."

      # ── Disk space (critical) ─────────────────────────────────────────────────
      - alert: DiskCritical
        expr: >
          node_filesystem_avail_bytes{fstype!="tmpfs"}
          / node_filesystem_size_bytes{fstype!="tmpfs"} < 0.05
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Disk critically full on {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} has less than 5% free (current: {{ $value | printf \"%.1f%%\" }})."

      # ── Container monitoring ──────────────────────────────────────────────────
      - alert: ContainerDown
        expr: up{job="docker"} == 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Docker stats exporter target down ({{ $labels.instance }})"
          description: "docker-stats-exporter target {{ $labels.instance }} has disappeared from scrape."

      # ── Loki ─────────────────────────────────────────────────────────────────
      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Loki is down"
          description: "Loki scrape target {{ $labels.instance }} is unreachable — log ingestion may be disrupted."
