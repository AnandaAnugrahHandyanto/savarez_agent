global:
  scrape_interval: 15s

scrape_configs:

  # VPS system metrics
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          host: jax-mind

  # Docker container metrics (docker-stats-exporter — replaces cAdvisor)
  - job_name: docker
    static_configs:
      - targets: ["docker-stats-exporter:9487"]
        labels:
          host: jax-mind

  # VictoriaMetrics self-metrics
  - job_name: victoriametrics
    static_configs:
      - targets: ["victoriametrics:8428"]

  # Traefik metrics
  - job_name: traefik
    static_configs:
      - targets: ["traefik:8082"]

  # Woodpecker CI metrics
  - job_name: woodpecker
    static_configs:
      - targets: ["woodpecker-server:9001"]
