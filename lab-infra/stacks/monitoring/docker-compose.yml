services:

  # ── VictoriaMetrics ──────────────────────────────────────────────────────────
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    container_name: victoriametrics
    restart: unless-stopped
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=90d"
      - "--httpListenAddr=:8428"
      - "--promscrape.config=/etc/vm/scrape.yml"
    volumes:
      - vm_data:/storage
      - ./victoriametrics/scrape.yml:/etc/vm/scrape.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://victoriametrics:8428/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - monitoring
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vm.rule=Host(`vm.jaxmind.xyz`)"
      - "traefik.http.routers.vm.entrypoints=web"
      - "traefik.http.services.vm.loadbalancer.server.port=8428"
      - "traefik.http.routers.vm.middlewares=vm-auth"
      - "traefik.http.middlewares.vm-auth.basicauth.users=${VM_AUTH}"

  # ── Node Exporter ────────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - monitoring
    labels:
      - "traefik.enable=false"

  # ── docker-stats-exporter ────────────────────────────────────────────────────
  # Replaces cAdvisor — uses Docker API (no overlayfs filesystem issues)
  docker-stats-exporter:
    image: wywywywy/docker_stats_exporter:latest
    container_name: docker-stats-exporter
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://docker-stats-exporter:9487/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - monitoring
    labels:
      - "traefik.enable=false"

  # ── Loki ─────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - loki_data:/loki
      - ./loki/config.yml:/etc/loki/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://loki:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - monitoring
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=Host(`loki.jaxmind.xyz`)"
      - "traefik.http.routers.loki.entrypoints=web"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"
      - "traefik.http.routers.loki.middlewares=loki-auth"
      - "traefik.http.middlewares.loki-auth.basicauth.users=${LOKI_AUTH}"

  # ── Promtail ─────────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /run/docker.sock:/run/docker.sock:ro
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://promtail:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - monitoring
    labels:
      - "traefik.enable=false"

  # ── Alertmanager ─────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/config.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - alertmanager_data:/alertmanager
      - ./alertmanager/config.yml:/etc/alertmanager/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://alertmanager:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - monitoring
    labels:
      - "traefik.enable=false"

  # ── Grafana removed — using Grafana Cloud ────────────────────────────────────
  # https://pablots99.grafana.net

  # ── vmalert ──────────────────────────────────────────────────────────────────
  vmalert:
    image: victoriametrics/vmalert:v1.101.0
    container_name: vmalert
    restart: unless-stopped
    command:
      - "--datasource.url=http://victoriametrics:8428"
      - "--remoteRead.url=http://victoriametrics:8428"
      - "--remoteWrite.url=http://victoriametrics:8428"
      - "--notifier.url=http://alertmanager:9093"
      - "--rule=/etc/vm/alerts.yml"
      - "--evaluationInterval=30s"
      - "--httpListenAddr=:8880"
    volumes:
      - ./victoriametrics/alerts.yml:/etc/vm/alerts.yml:ro
    depends_on:
      - victoriametrics
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8880/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - monitoring
    labels:
      - "traefik.enable=false"

volumes:
  vm_data:
  loki_data:
  alertmanager_data:

networks:
  monitoring:
    name: monitoring
    external: true
  proxy:
    external: true
