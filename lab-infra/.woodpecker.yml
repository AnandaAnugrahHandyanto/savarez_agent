when:
  branch: main
  event: push

steps:
  - name: deploy-changed-stacks
    image: alpine:3.20
    # AGE_PRIVATE_KEY: age private key for SOPS decryption of .env.enc stack secrets
    # Registered as a global secret in Woodpecker (injected by Jax via SQLite — PAB-28)
    secrets:
      - AGE_PRIVATE_KEY
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /lab:/lab
      - /usr/bin/docker:/usr/bin/docker
    commands:
      - |
        set -e

        # Install dependencies
        apk add --no-cache curl rsync

        # Install sops (needed for .env.enc decryption)
        SOPS_VERSION="v3.9.4"
        curl -sL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o /usr/local/bin/sops
        chmod +x /usr/local/bin/sops

        # Write age private key to temp file and export path
        AGE_KEY_FILE=""
        if [ -n "$AGE_PRIVATE_KEY" ]; then
          AGE_KEY_FILE=$(mktemp)
          echo "$AGE_PRIVATE_KEY" > "$AGE_KEY_FILE"
          export SOPS_AGE_KEY_FILE="$AGE_KEY_FILE"
          echo "🔑 Age key loaded from Woodpecker secret"
        else
          echo "⚠️  AGE_PRIVATE_KEY secret not set — .env.enc files will not be decrypted"
        fi

        # Detect which stacks changed in this push
        CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^stacks/' | cut -d'/' -f2 | sort -u)
        if [ -z "$CHANGED" ]; then
          echo "No stack changes detected, skipping deploy"
          [ -n "$AGE_KEY_FILE" ] && rm -f "$AGE_KEY_FILE"
          exit 0
        fi

        for STACK in $CHANGED; do
          echo ">>> Deploying stack: $STACK"
          bash /lab/infra/scripts/deploy-stack.sh "$STACK"
        done

        # Clean up age key file
        if [ -n "$AGE_KEY_FILE" ] && [ -f "$AGE_KEY_FILE" ]; then
          rm -f "$AGE_KEY_FILE"
          echo "🗑️  Age key temp file removed"
        fi
