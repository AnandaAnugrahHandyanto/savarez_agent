---
- name: Create Traefik stack directory
  file:
    path: "{{ stacks_path }}/traefik"
    state: directory
    mode: "0755"

- name: Copy Traefik compose file
  copy:
    src: "{{ infra_path }}/stacks/traefik/docker-compose.yml"
    dest: "{{ stacks_path }}/traefik/docker-compose.yml"
    remote_src: true

- name: Check .env exists
  stat:
    path: "{{ stacks_path }}/traefik/.env"
  register: traefik_env

- name: Fail if .env missing
  fail:
    msg: "Traefik .env missing. Copy stacks/traefik/.env.example to {{ stacks_path }}/traefik/.env and fill in values."
  when: not traefik_env.stat.exists

- name: Deploy Traefik
  community.docker.docker_compose_v2:
    project_src: "{{ stacks_path }}/traefik"
    state: present
    pull: always
