---
- name: Create monitoring stack directory
  file:
    path: "{{ stacks_path }}/monitoring"
    state: directory
    mode: "0755"

- name: Sync monitoring stack
  synchronize:
    src: "{{ infra_path }}/stacks/monitoring/"
    dest: "{{ stacks_path }}/monitoring/"
    delete: false
    recursive: true

- name: Check .env exists
  stat:
    path: "{{ stacks_path }}/monitoring/.env"
  register: monitoring_env

- name: Fail if .env missing
  fail:
    msg: "Monitoring .env missing. Copy stacks/monitoring/.env.example to {{ stacks_path }}/monitoring/.env and fill in values."
  when: not monitoring_env.stat.exists

- name: Deploy monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ stacks_path }}/monitoring"
    state: present
    pull: always
