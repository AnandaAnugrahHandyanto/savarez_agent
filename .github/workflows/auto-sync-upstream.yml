name: Auto Sync Upstream

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork feat
        uses: actions/checkout@v4
        with:
          ref: feat/tui-i18n-localization
          fetch-depth: 0

      - name: Add upstream
        run: git remote add upstream https://github.com/NousResearch/hermes-agent.git

      - name: Fetch upstream main
        run: git fetch upstream main

      - name: Check if behind
        id: check
        run: |
          behind=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$behind" >> $GITHUB_OUTPUT
          echo "$behind commits behind upstream"

      - name: Merge upstream
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/main --no-edit -m "Auto-sync: merge upstream/main"
          git push origin feat/tui-i18n-localization
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report conflict
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[auto-sync] Merge conflict with upstream/main',
              body: `Auto-sync workflow failed on ${new Date().toISOString()}.

            Please resolve conflicts manually:
            \`\`\`bash
            git checkout feat/tui-i18n-localization
            git fetch upstream main
            git merge upstream/main
            # resolve conflicts, then:
            git push
            \`\`\``
            });
