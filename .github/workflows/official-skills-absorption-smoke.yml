name: Official Skills Absorption Smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  official-skills-absorption-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Extract skill metadata for dashboard
        run: |
          source .venv/bin/activate
          python3 website/scripts/extract-skills.py

      - name: Run official skills absorption smoke tests
        run: |
          source .venv/bin/activate
          python -m pytest -q \
            tests/skills/test_telephony_skill.py \
            tests/skills/test_memento_cards.py \
            tests/skills/test_youtube_quiz.py
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
