name: Upstream Sync

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git || true
          git fetch upstream main

      - name: Attempt rebase
        id: rebase
        run: |
          git checkout -b upstream-sync-$(date +%Y%m%d)
          if git rebase upstream/main; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            git rebase --abort
            echo "status=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Create PR on clean rebase
        if: steps.rebase.outputs.status == 'clean'
        run: |
          git push origin upstream-sync-$(date +%Y%m%d)
          gh pr create \
            --title "chore: sync with upstream $(date +%Y-%m-%d)" \
            --body "Automated weekly rebase onto upstream/main. All patches applied cleanly." \
            --base main \
            --head upstream-sync-$(date +%Y%m%d)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on conflict
        if: steps.rebase.outputs.status == 'conflict'
        run: |
          gh issue create \
            --title "Upstream sync conflict $(date +%Y-%m-%d)" \
            --body "Weekly rebase onto upstream/main had conflicts. Manual resolution needed." \
            --label "upstream-sync"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
