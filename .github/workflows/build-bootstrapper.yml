name: Build NOverhead Bootstrapper

on:
  workflow_dispatch:
  push:
    branches:
      - feature/noverhead-branding

permissions:
  contents: read

jobs:
  build-bootstrapper:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Pin time crate if needed
        working-directory: apps/bootstrap-installer/src-tauri
        run: cargo update -p time --precise 0.3.47

      - name: Build bootstrapper
        working-directory: apps/bootstrap-installer
        run: npm run tauri:build

      - name: Upload setup exe
        uses: actions/upload-artifact@v4
        with:
          name: NOverhead-Agent-Desktop-Setup
          path: apps/bootstrap-installer/src-tauri/target/release/NOverhead-Agent-Desktop-Setup.exe
