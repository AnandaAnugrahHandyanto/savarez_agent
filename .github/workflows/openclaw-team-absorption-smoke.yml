name: OpenClaw Team Absorption Smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  openclaw-team-absorption-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run OpenClaw team absorption smoke tests
        run: |
          source .venv/bin/activate
          python -m pytest -q \
            tests/test_openclaw_multi_agent_team_e2e.py \
            tests/test_hermes_team_registry_api.py \
            tests/test_hermes_team_audit_diff.py \
            tests/tools/test_delegate.py \
            tests/agent/test_memory_provider.py
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
