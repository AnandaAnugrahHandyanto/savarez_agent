name: Hermes Agent CI/CD

on:
  schedule:
    - cron: '5 19 * * 6'      # 北京时间周日 03:05
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      # 0. 🧹 清理战场：在做任何事之前，先把官方的干扰文件移走
      - name: Clean up Official Workflows
        run: |
          #!/bin/bash
          set -e # 遇到错误立即停止（可选）
          
          WORKFLOW_DIR=".github/workflows"
          DISABLED_DIR="$WORKFLOW_DIR/disabled"
          
          # 1. 创建禁用目录
          mkdir -p "$DISABLED_DIR"
          
          # 2. 查找所有 yml/yaml 文件
          # 注意：这里排除了我们当前的 main.yml，以及可能存在的 sync 文件
          # find 命令逻辑：找到文件 -> 如果文件名不是 main.yml -> 移动
          for file in $(find "$WORKFLOW_DIR" -maxdepth 1 -type f \( -name "*.yml" -o -name "*.yaml" \) 2>/dev/null || echo ""); do
            filename=$(basename "$file")
            # 如果文件名不是 main.yml (也就是当前这个文件)，就移动它
            if [[ "$filename" != "main.yml" ]]; then
              echo "🧹 移动干扰文件: $filename"
              mv "$file" "$DISABLED_DIR/"
            fi
          done
          
          # 3. 如果有变更，自动提交（防止下次同步回来）
          if git diff --quiet; then
            echo "✅ 没有文件变动，无需提交。"
          else
            echo "📦 检测到文件变动，正在提交..."
            git config --global user.name "Auto-Cleaner"
            git config --global user.email "action@noreply.github.com"
            git add "$DISABLED_DIR/"
            git commit -m "🧹 Auto-disable official workflows"
            git push
          fi

      # 1. 检出你的 Fork 仓库代码
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 同步上游官方仓库的最新代码
      - name: Sync with upstream (official) repository
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git 2>/dev/null || true
          git fetch upstream
          git checkout main
          # 强制合并，如果有冲突需要手动处理
          git merge upstream/main --no-edit --allow-unrelated-histories
          git push origin main

      # 3. 登录阿里云 ACR
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # 4. 设置 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. 构建并推送 Docker 镜像
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/hermes-agent:latest
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/hermes-agent:build-${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SKIP_TESTS=true
