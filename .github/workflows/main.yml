name: Hermes Agent CI/CD

on:
  schedule:
    - cron: '5 19 * * 6'      # 北京时间周日 03:05
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream (official) repository
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories || true
          if [ $? -eq 0 ]; then
            git push origin main
          else
            echo "Merge conflict detected. Please resolve manually."
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # >>>>>>>> 修正点 1 & 2 & 3：调整顺序并修正安装命令 <<<<<<<<
      - name: Set up Python and Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 核心修正：使用 -e .[all] 安装项目及其所有额外依赖
          pip install -e .[all]

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        # id: docker_build (注释掉id，除非你后面有步骤需要用到它的输出)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/hermes-agent:latest
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/hermes-agent:build-${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
