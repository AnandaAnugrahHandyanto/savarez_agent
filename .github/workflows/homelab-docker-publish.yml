# homelab-docker-publish.yml — Build and push hermes-agent to ghcr.io/avbdev.
#
# Why this exists:
#   The upstream docker-publish.yml is guarded by
#   `if: github.repository == 'NousResearch/hermes-agent'` and pushes to
#   Docker Hub under the nousresearch org. This fork-specific workflow builds
#   from the same public Dockerfile and publishes to ghcr.io/avbdev so the
#   homelab Kubernetes cluster can pull it without depending on NousResearch's
#   private GHCR packages.
#
# Triggers:
#   - Manual (workflow_dispatch): run on-demand with an optional tag override.
#   - Tag push (v*): auto-build whenever this fork is synced and a new
#     upstream tag is cherry-picked / tagged here.
#   - Sync push to main: build :latest on every main sync.
#
# Image names produced:
#   ghcr.io/avbdev/hermes-agent:latest   (always on main push / manual)
#   ghcr.io/avbdev/hermes-agent:<tag>    (on tag push or manual tag override)
#
# Make the package public after the first push:
#   github.com/users/avbdev/packages/container/hermes-agent/settings
#   → Change package visibility → Public
#   (then no K8s imagePullSecret is needed)

name: Homelab Docker Build and Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build and push (e.g. v2026.6.5). Leave blank to use "latest".'
        required: false
        default: ''
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/homelab-docker-publish.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: homelab-docker-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/avbdev/hermes-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          IMAGE="${{ env.IMAGE }}"
          TAGS="${IMAGE}:latest"

          # Tag push (e.g. v2026.6.5)
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="${TAGS},${IMAGE}:${{ github.ref_name }}"
          fi

          # Manual workflow_dispatch with an explicit tag input
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAGS="${TAGS},${IMAGE}:${{ inputs.tag }}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Building tags: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=homelab-amd64
          cache-to: type=gha,mode=max,scope=homelab-amd64

      - name: Summary
        run: |
          echo "## Image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags pushed:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Update K8s deployment:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# In homelab.platform.apps: apps/apps/hermes-agent/deployment.yaml" >> $GITHUB_STEP_SUMMARY
          echo "# image: ghcr.io/avbdev/hermes-agent:<new-tag>" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
