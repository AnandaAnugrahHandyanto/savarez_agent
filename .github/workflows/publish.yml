name: Publish Miles to GHCR

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/publish.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # Build amd64-only first so we can `load` it into the local daemon for a
      # smoke test. Multi-arch push happens in the next step.
      - name: Build image (amd64, smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image starts
        run: |
          # Image runs as UID 10000. GitHub Actions creates /tmp dirs root-owned
          # by default, so chown the bind mount to match the in-container UID.
          mkdir -p /tmp/miles-test
          sudo chown -R 10000:10000 /tmp/miles-test
          docker run --rm \
            -v /tmp/miles-test:/opt/data \
            --entrypoint /opt/miles/docker/entrypoint.sh \
            ${{ steps.image.outputs.name }}:test --help

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          tags="${{ steps.image.outputs.name }}:latest"
          tags="$tags,${{ steps.image.outputs.name }}:${{ github.sha }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            tags="$tags,${{ steps.image.outputs.name }}:${{ github.event.release.tag_name }}"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Push multi-arch image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
