name: Docker Build and Publish

on:
  schedule:
    # Weekly rebuild picks up patched Debian packages (5 CRITICAL, 36 HIGH
    # CVEs as of 2026-05-21; see #30073).  Runs Sunday 06:00 UTC so any
    # breakage is visible before the work week.
    - cron: '0 6 * * 0'
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/docker-publish.yml'
      - '.github/actions/hermes-smoke-test/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/docker-publish.yml'
      - '.github/actions/hermes-smoke-test/**'
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: docker-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: nousresearch/hermes-agent

jobs:
  build-amd64:
    if: github.repository == 'NousResearch/hermes-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Build image (amd64, smoke test)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:test
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,mode=max,scope=docker-amd64
      - name: Smoke test image
        uses: ./.github/actions/hermes-smoke-test
        with:
          image: ${{ env.IMAGE_NAME }}:test
      - name: Log in to Docker Hub
        if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push amd64 by digest
        id: push
        if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,mode=max,scope=docker-amd64
      - name: Export digest
        if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' || github.event_name == 'release'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest artifact
        if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: digest-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-arm64:
    if: github.repository == 'NousResearch/hermes-agent'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Build image (arm64, smoke test)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/arm64
          tags: ${{ env.IMAGE_NAME }}:test
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=docker-arm64
          cache-to: type=gha,mode=max,scope=docker-arm64
      - name: Smoke test image
        uses: ./.github/actions/hermes-smoke-test
        with:
          image: ${{ env.IMAGE_NAME }}:test
      - name: Log in to Docker Hub
        if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push arm64 by digest
        id: push
        if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-arm64
          cache-to: type=gha,mode=max,scope=docker-arm64
      - name: Export digest
        if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' || github.event_name == 'release'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest artifact
        if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: digest-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.repository == 'NousResearch/hermes-agent' && ((github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' || github.event_name == 'release')
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    timeout-minutes: 10
    outputs:
      pushed_release_tag: ${{ steps.mark_release_pushed.outputs.pushed }}
      release_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1000

      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Decide whether to move :main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: main_check
        run: |
          set -euo pipefail
          image=nousresearch/hermes-agent
          image_json=$(docker buildx imagetools inspect "${image}:main" --format '{{ json (index .Image "linux/amd64") }}' 2>/dev/null || true)
          if [ -z "${image_json}" ]; then echo "No existing :main -- safe to publish."; echo "push_main=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          current_sha=$(printf '%s' "${image_json}" | jq -r '.config.Labels."org.opencontainers.image.revision" // ""')
          if [ -z "${current_sha}" ]; then echo "Registry :main has no revision label -- safe to publish."; echo "push_main=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "Registry :main is at ${current_sha}"; echo "This run is at ${GITHUB_SHA}"
          if [ "${current_sha}" = "${GITHUB_SHA}" ]; then echo ":main already at our SHA -- nothing to do."; echo "push_main=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if ! git cat-file -e "${current_sha}^{commit}" 2>/dev/null; then git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main" || true; fi
          if ! git cat-file -e "${current_sha}^{commit}" 2>/dev/null; then echo "Unknown commit -- refusing to overwrite."; echo "push_main=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if git merge-base --is-ancestor "${current_sha}" "${GITHUB_SHA}"; then echo "Descendant of :main -- safe to advance."; echo "push_main=true" >> "$GITHUB_OUTPUT"
          else echo "Another run advanced :main past us."; echo "push_main=false" >> "$GITHUB_OUTPUT"; fi

      - name: Compute tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            LATEST_RELEASE=$(gh api repos/NousResearch/hermes-agent/releases/latest --jq '.tag_name')
            echo "tag=${LATEST_RELEASE}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Create manifest list and push
        if: github.event_name != 'push' || steps.main_check.outputs.push_main == 'true'
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          args=()
          for digest_file in *; do args+=("${IMAGE_NAME}@sha256:${digest_file}"); done
          docker buildx imagetools create -t "${IMAGE_NAME}:${TAG}" "${args[@]}"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Inspect image
        if: github.event_name != 'push' || steps.main_check.outputs.push_main == 'true'
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${TAG}"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Mark release tag pushed
        id: mark_release_pushed
        if: github.event_name == 'release'
        run: echo "pushed=true" >> "$GITHUB_OUTPUT"

  move-latest:
    if: |
      github.repository == 'NousResearch/hermes-agent'
      && github.event_name == 'release'
      && needs.merge.outputs.pushed_release_tag == 'true'
    needs: merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: docker-move-latest
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1000
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Decide whether to move :latest
        id: latest_check
        run: |
          set -euo pipefail
          image=nousresearch/hermes-agent
          image_json=$(docker buildx imagetools inspect "${image}:latest" --format '{{ json (index .Image "linux/amd64") }}' 2>/dev/null || true)
          if [ -z "${image_json}" ]; then echo "No existing :latest -- safe."; echo "push_latest=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          current_sha=$(printf '%s' "${image_json}" | jq -r '.config.Labels."org.opencontainers.image.revision" // ""')
          if [ -z "${current_sha}" ]; then echo "No revision label -- safe."; echo "push_latest=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "Registry :latest at ${current_sha}"; echo "This release at ${GITHUB_SHA}"
          if [ "${current_sha}" = "${GITHUB_SHA}" ]; then echo "Already at our SHA."; echo "push_latest=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if ! git cat-file -e "${current_sha}^{commit}" 2>/dev/null; then git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main" || true; fi
          if ! git cat-file -e "${current_sha}^{commit}" 2>/dev/null; then echo "Unknown commit."; echo "push_latest=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if git merge-base --is-ancestor "${current_sha}" "${GITHUB_SHA}"; then echo "Descendant of :latest -- safe."; echo "push_latest=true" >> "$GITHUB_OUTPUT"
          else echo "Existing :latest is newer."; echo "push_latest=false" >> "$GITHUB_OUTPUT"; fi
      - name: Move :latest to this release tag
        if: steps.latest_check.outputs.push_latest == 'true'
        env:
          RELEASE_TAG: ${{ needs.merge.outputs.release_tag }}
        run: |
          set -euo pipefail
          image=nousresearch/hermes-agent
          docker buildx imagetools create --tag "${image}:latest" "${image}:${RELEASE_TAG}"
