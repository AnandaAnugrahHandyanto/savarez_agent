name: Darwinian Evolver Nightly Self-Improvement

on:
  schedule:
    - cron: "17 3 * * *"   # daily 03:17 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no LLM calls, no PRs)"
        required: false
        default: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pyyaml

      - name: Run sweep (dry-run by default)
        env:
          OPENROUTER_API_KEY: ${{ secrets.EVOLVER_NIGHTLY_KEY }}
          HERMES_HOME:        ${{ runner.temp }}/hermes-home
          DRY_RUN:            ${{ github.event.inputs.dry_run || 'true' }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0,
              "optional-skills/research/darwinian-evolver/scripts")
          import repo_sweep

          out = Path("${{ runner.temp }}/sweep-out")
          out.mkdir(parents=True, exist_ok=True)
          cfg = repo_sweep.SweepConfig(
              repo_root=Path(".").resolve(),
              output_dir=out,
              budget_usd=float(os.environ.get("BUDGET_USD", "10")),
              dry_run=os.environ.get("DRY_RUN", "true").lower() != "false",
          )
          results = repo_sweep.sweep(cfg)
          Path("sweep-report.json").write_text(
              json.dumps([r.__dict__ for r in results], default=str, indent=2),
              encoding="utf-8",
          )
          print(f"scanned: {len(results)} skills")
          print(f"improved: {sum(1 for r in results if r.improved)}")
          PY

      - name: Upload sweep report
        uses: actions/upload-artifact@v4
        with:
          name: sweep-report
          path: sweep-report.json
          retention-days: 14

      # Future step: if improvements found AND not dry-run, open
      # per-skill Draft PRs with the evolved text. Deliberately
      # omitted from v0.5 ship: the contract stays Draft-only +
      # manual so maintainers control merge cadence.
