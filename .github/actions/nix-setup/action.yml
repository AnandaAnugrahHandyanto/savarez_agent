name: 'Setup Nix'
description: 'Install Nix with DeterminateSystems (optional flake cache bootstrap)'

runs:
  using: composite
  steps:
    - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
    # Requires FlakeHub registration / OIDC; fork PRs and unregistered repos fail auth.
    # Keep Nix flake checks runnable without cache (slower builds, same correctness).
    - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      continue-on-error: true
